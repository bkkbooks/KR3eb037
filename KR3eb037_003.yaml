body:
  text: 卷下經義叢談經脈續辨凡講脈學須先識脈為何物故一再致辨而不憚繁前著十二經動脈辨詳矣今更取內經及西醫之論以質之夫脈之動者不待言矣其不動者在素問三部九候論曰以左手足上去踝五寸按之右手當踝而彈之其應五寸以上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病其應上不能至五寸彈之不應者死此言針刺時彈其經脈而使之動以觀其氣之至不至也非動脈也難經七十八難曰先以左手厭按所針榮俞之處彈而努之爪而下之其氣之來如動脈之狀即此義也曰如動脈則其脈之本不動可知也離合真邪論曰邪之去絡入經也客於血脈之中經之動脈其至也亦時隴起是明明有動脈血脈之分矣靈樞經脈曰脈之卒然動者皆邪氣居之留於本末不動則熱不堅則陷且空不與衆同曰卒然動則非常動可知也經脈別論曰食入於胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈如是則經與脈之為二物也不曉然乎或曰西醫之論脈也人身止有血脈而無氣之專脈百脈皆由肺以聚於心由心以達於四肢百骸脈之動者心動也動則氣推血行愈行愈遠遠則炭氣盛而血質漸壞矣於是由回血管復返於肺以達於心回血管者即藍色隱隱於皮膚之下者也血既聚於心由肺呼吸以吐炭氣而納養氣於是血之質復精而復外達於四肢百骸如是環周不已皆氣行血中非血自血氣自氣也人死解而視之有無血之管者非本無血也氣盡故血亦因之而盡也是説也吾未信之夫人死氣盡血不推行當壅脈中何得血亦盡乎蓋氣管本有細竅與血道通所謂微絲管也氣在管中充塞滿溢血不得滲入氣盡而血遂滲入矣故死後氣管中有有血者有無血者且西醫有曰吸液管者吸攝食物之精液以達於周身與脈同路其中無血千支百派散布大小腸夾膜之間食後少頃內有精液始見如白絲一切吸管附近小腸會合為一名曰吸液總管附脊骨上行至頸骨第七節即屈轉而下併入回血會管達於心此即王勳臣所謂衛總管者也非氣管而何是故經者血脈也脈者氣脈也血脈者不動而氣脈動者也專就動脈之中分辨氣血則其形屬血其動屬氣統合人身之脈分辨氣血則確有注氣之脈注血之脈而不紊者也全體闡微曰脈管回管之外更有一類曰吸管以其能吸攝津液也全體皆有分淺深二類深者與脈管同路淺者與回管同路總吸管由第二腰骨右旁小腸處起有衆吸管來會上行至總脈後血總管也展大如囊中藏養汁再上行由膈總脈孔入胸膛在肺中後峽間在總脈上總回管中至第四背骨岐分左右二總管左者向背骨左又上行食管左至第四頸骨彎回而下由左頸內回管左鎖柱骨下回管合處透入腋下上下大中小有時中處分為二復合一門扇甚多此左總吸管也除頭右心右胸膛右肺右頸右及手肝等處右吸管不入其左諸吸管莫不會入於此其右總吸管則接右諸吸管至右鎖柱骨回管會入其左諸吸管亦不入也周身吸管中藏明汁稀而咸有味無色或微黃由總吸管分數大吸管更分無數小吸管以至微絲管分散如網無微不至或彼此復相併為大管無論大小淺深統會總吸管入首臂回管止以達於心也案西書之意謂總吸管由小腸發原貼近脊骨五臟六腑皆有細管來會上行由左右鎖柱骨下透腋分行兩臂周身無微不到其出也與脈管同路其回也與回管同路氣管血管並行之説不更信而有徵耶西醫必謂動者血管而吸管不動也果何徵耶蓋嘗思之吸液管之微絲管必通於血管之微絲管藉氣之鼓激送津液由微絲入血管以滑利血之運行也西醫謂小兒疳疾婦人乾血勞皆吸液管病是氣亢津耗不能透入血管也二者脈象皆見細數吸管幹澀事理皎然西醫徒恃顯微鏡窺測以赤者為血管白者為液管皆是據形言之氣之無形遂不知之矣又按液管貼近脊骨血管貼近液管考之內經是液管即督脈血管即衝脈矣回血總管當配任脈所謂任脈通太衝脈盛月事以時下是也氣之發也周身液管同時俱動其回管則力衰不能動矣靈樞曰氣之離臟也卒然如弓弩之發上於魚以反衰其餘氣衰散以逆上故其行微即此義也榮行脈中衛行脈外分診法附再辨動脈非血脈附辨吐血前著氣分血分直言論氣血分診法悉矣然皆在脈中者也若所謂榮行脈中衛行脈外者又將何以診之靈樞經脈篇曰經脈者常不可見其虛實也以氣口知之此即所以診榮也又曰循其本末察其寒溫此即所以診衛也人身之氣濕熱而已榮主濕衛主熱衛衰則身寒故可據皮膚之寒溫候衛氣之虛實也本末者尺膚上下也素問通評虛實論曰經絡皆實是寸脈急而尺緩也絡氣不足經氣有餘者脈口熱而尺寒也經虛絡滿者尺熱滿脈口寒澀也夫經實而脈急者脈有管以束之氣實於中則脈繃急而挺起矣絡實而尺緩者絡散於肌膚者也氣實於中則尺膚豐盛而膹起矣絡不足而尺寒者衛不足以溫之也且寒有蕭索之意是消而著也經有餘而脈熱者非經中真氣有餘乃脈外衛氣侵入且熱有盛滿之意是大而強也脈經亦曰衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿經脈乃大盛由此觀之絡氣屬衛經氣屬營不皎然乎論疾診尺篇曰脈緩尺之皮膚亦緩脈急尺之皮膚亦急脈滑尺之皮膚亦滑脈澀尺之皮膚亦澀脈小尺之皮膚亦減而少氣脈大尺之皮膚亦盛而膹起此所謂榮衛相應者也劉若金本草述黃耆條下亦云分肉腠理之間可以徵元氣之充與否若分肉腠理一有不充即是膻中之氣化不足由此觀之切脈口以候榮按尺膚以候衛又何疑乎大抵榮衛相隨不宜偏勝嘗憶先哲有言脈貴有根尤貴有神即如五臟絶脈惟肺如風吹毛空而無根其他臟絶脈沉候與尺部皆按之鼓指分外堅搏如彈石如循刀刃如雀啄如操帶鉤皆無神而似有根者也其有根而死者何也蓋木根深入地中而死者不得氣故也凡木根雖下垂而根上旁須四面旋繞得四方之土氣氣盛方能旁見側出枝葉四布人之脈隱於肌肉之內不但下至尺深至筋骨亦必按之中間與肌肉相連一片如是則氣血交紐榮衛未離謂之有氣有氣便是有根嘗見陰虧之輩以及年高之人其脈若獨然一條扛起似與肌肉不相連絡陰與陽分是無氣也此段議論明白曉暢發前人所未發而榮衛之診益皎然矣老人皮著肉消而脈獨挺亙指下與將死者脈如湯沸勢欲湧出皮膚之上是非脈中之氣盛也乃脈中之氣衰而衛氣陷之脈中之氣絶而衛氣亂之也前人只言脈與肌肉太無分別謂之散脈而不知脈與肌肉太有分別又謂之絶脈以有偏絶故有偏勝也是故常人之身脈中脈外之氣升降遲速兩相應者也一有不應榮衛乖離而寒熱往來之證作矣古人所以診脈必兼診尺者正以調其榮衛也仲景高章卑惵以脈之浮主衛沉主榮脈之來主衛去主榮是陽升陰降陽噓陰吸之義也故專就動脈以分榮衛則脈體之浮沉呼吸形勢可分驗之分脈中脈外以驗榮衛則脈體之緩急與尺膚之緩急可合驗之合驗於脈中則分驗其浮沉呼吸形勢也分驗於脈外則合驗其形體之緩急也榮衛雖相應而不可相干若宗氣者榮衛之所合也外主呼吸內主動脈是動脈本夾雜悍氣在內故能一動而周身悉應也若在血管則滯於有形其應不能如是之神矣液亦極膩但液管中虛不似血管之滿實也苟或悍氣竄入血管迫血妄行血駛而無隙可泄則為狂為厥矣有隙得泄則為湧血泄血傾碗傾盆矣狂者血奔於大經之中外行周身而不得寧息者也厥者血迫於大經之中內觸臟腑而氣機乍窒者也血上行而遇隙則湧血血下行而遇隙則泄血內經曰衛氣慓悍滑疾見開而出即此義也又曰有病怒狂者此名陽厥何以知之陽明者常動巨陽少陽不動不動而動大疾此其候也觀此則血脈斷不可動而動脈之決不能有血也審矣陽明常動者是陽明之氣脈見於俠喉兩旁也巨少氣脈過頸者不見於外故不得動非巨少無動脈也其動大疾是亂氣竄人巨少之血脈故也葉天士於吐血暴證急泄肺氣即泄衛之意也近日盲醫惑於陳修園邪説謬托法古重用薑桂自矜卓識而人已死矣血證可任薑桂者乃咳嗽帶血其血如絲如縷因於下寒血不歸經素問所謂脈急則血泄者也暴血湧出脈多洪弦滑數挺亙如索嗽血脈多弦澀沉遲寒緊之象也久嗽火亢陰虧脈變細數即不可治此榮氣自病非衛氣之來干也奇經八脈體用病機治法夫沖任督三脈為氣血之海氣血先儲於此乃分注十二經也帶脈與二蹺二維則縱橫表裡於十二經之間以受十二經之滿溢者也難經謂八脈者不拘於經也譬之聖人圖設溝渠通利水道以備不虞天雨降下溝渠滿溢雱霈妄行此時聖人不能復圖也此絡脈滿溢諸經不能復拘也故奇經八脈者十二經儲蓄之淵海即十二經旋轉之樞機十二經充滿壅實得奇經以為之地其氣機始得旋轉而通靈也又謂沖督用事則十二經不復朝於寸口奇經者異常之大脈沖督又奇經之最大也二脈壅實是周身氣機窒而不轉矣前人謂痙病其脈直上下即督脈壅窒之病也十二經仰給於沖督沖督空虛十二經無所稟矣是故十二經實猶有奇經以融之至奇經亦實而周身氣機皆窒矣故為痙厥癲癇也十二經虛猶有奇經以濟之至奇經亦虛而氣血本原全匱矣故為虛損勞極不治也此奇經八脈之體用也奇經八脈病候歷詳內經難經脈經悉矣張潔古藥注難經其於奇經治法仍不外正經治法今其書不存而八脈之性情可測也是故督脈行身之後其性情在太陽少陰之間太陽行氣少陰藏精而督脈統領精氣者也任脈行身之前其性情在太陰陽明之間二脈主血而任亦主血海者也陽蹺陰蹺行身之側與少陽厥陰同性二脈主筋二蹺亦主筋故病緩急也陽維主皮膚之氣行身之表陰維主脂膜之氣行身之裡故病寒熱內痛也衝脈主三焦直行之氣病則或上逆或下陷也帶脈主中焦橫行之氣病則或濕熱流於肝經或濕寒流於腎府也昔賢謂帶脈主脾是矣督脈為開任脈為闔二蹺為樞觀內經論夜不能寐陽不入陰必歸於二蹺可知也衝脈為開帶脈為闔二維為樞此則經無明文以意逆而得之故氣寒傷督血少傷任鬱結傷沖弛緩傷帶而陰陽不和開闔不利上下不暢表裡不通則二蹺二維傷矣此奇經八脈之病機也督之治多用鹿茸附子羌活藁本以通陽也任之治多用龜板阿膠熟地枸杞以養陰也二蹺之治從柴胡例通表裡也二維之治從桂枝例和營衛也帶之治健脾而兼強肝也沖之治獨有妙者仲景治奔豚沖氣不用白朮舊解謂其固氣其説已未甚明晰而所以必取桂枝細辛者舊解謂其和肝散水殊不知氣有升降有出入橫絡出入不暢而氣始直升矣桂枝細辛以通橫絡也是即三焦膀胱應於腠理毫毛之義也前人謂奇經諸病屬於氣鬱蓄熱之有餘者易治惟針砭為最捷屬於氣虛血損之不足者難治雖龜鹿而無功大凡損及奇經其填補須用加倍法非有他訣即治實邪亦然難經曰其受邪畜熱砭射之仲景曰太陽病服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈張石頑傷寒纘論引內編曰服桂枝湯不解而煩本方加羌辛藁本通其督脈則愈即刺風池風府之意也此所謂加倍治法也此奇經八脈之治法也脈有分看合看法所謂合看者如脈浮而緊即合為弦脈弦而大即合為革是也所謂分看者如弦脈有浮有緊革脈有弦有大是也由是浮主何證緊主何證即可知浮緊合之當主何證矣弦主何證如弦則為減減則為寒也大主何證如大則為芤芤則為虛也即可知弦大合之當主何證矣此入門之最捷法也即如仲景脈浮而大浮為氣實大為血虛脈濡而緊濡則衛氣微緊則榮中寒是古人看脈決病亦不離此法脈有三部九候合參法三部九候者診脈之定位也故素問曰知內者按而紀之謂輕重舉按以審浮中沉之變象也知外者終而始之謂上下循捫以審寸關尺之變象也常法左手三部配心肝腎右手三部配肺脾命而各系以所相表裡之腑難經又不分左右不分三部只以菽數之輕重分主五臟此法今世罕用獨余自臨診以來每遇疑難莫決之脈即以二法互參而其真立見如三菽之重者肺脈也其象與右寸同即肺病矣六菽之重者心脈也其象與左寸同即心病矣看其何脈而決其何病也又如九菽之重者脾脈也其象與兩尺同是水土同病矣十二菽之重者肝脈也其象與左寸同是木火同病矣亦看其何脈而決其何病也且病之來蹤去迹指下猝難辨別者一經審度及此亦往往豁然自明故知古人之定三部九候也非三部自三部九候自九候也學者苟能悟透此理則胸中開朗萬法莫不六通四闢矣豈第一診脈而已哉又有兩手同診以審遲速大小之相應不相應者凡遇急病危病覺兩手脈來有異即宜此法此又兩手六部之合參也又凡初學診脈察病者先以兩手六部十八候分作十八等脈再看何部脈同何候脈異以推其中之生克順逆而患者一身邪正全局具在胸中矣如此久久用熟自然下指便見無煩推測之勞若起手不知剖析只管鶻突恐終身無見真之日也讀醫須先識各經主脈主證嘗謂學醫者讀經論須是先將五臟六腑十二經內因外因不內外因以及五臟相乘六腑相乘各專證一一類聚而詳記之讀脈書須是先將五臟六腑十二經內因外因不內外因以及五臟相乘六腑相乘各主脈一一類聚而詳記之則胸中有主臨診可以不惑矣斯為捷法凡證之變有萬無非各專證之所互乘也脈之變亦有萬無非各主脈之所互乘也今讀此事難知述東垣所論脈證大義正與此合因録於下以備省覽脈之相合各有虛實不可作一體視之假令洪弦相合洪客也弦主也子能令母實也弦洪相合弦客也洪主也母能令子虛也餘臟可以類推至於手足之經亦相合假令傷寒脈浮緊而帶洪者即手經病也余仿此假令侮所不勝者挾其勢也脈弦而入金之分非挾火之勢則不敢以侵金之分治病無問傷寒畜血結胸發黃等病諸證並一切雜證各當於六經中求之謂如發黃證或頭痛腰脊強惡寒即有太陽證也或身熱目疼鼻乾不得臥即有陽明證也其餘諸經仿此更有六經相流入者如手陽明流入足陽明是上流下也本非足經病當於手經中求之是知治足經者非也亦有下而流上者更有支別流入者有同鄰為病者鄰者表裡相絡者是也更有氣類相感者病在此經本未傳入彼經而氣息株連致彼經亦不可得安如素胃寒者偶爾感冒即口淡不思食也葉天士亦謂病溫熱者若腎水素虧雖熱邪未入下焦每多先自仿惶矣有夫婦各相傳者即甲傳己脾傳腎之類假令腹痛桂枝加芍藥大黃何為不直用芍藥大黃卻於桂枝湯內加之大抵治病必求其本此腹痛知從太陽中來故以太陽為本也必太陽證仍在也觀於東垣論脈與證治則當先明主脈主證主治也審矣內經曰先病為本後病為標有客氣有同氣謹察間甚以意調之間者並行甚者獨行客氣者謂既有先病復感新邪而生後病先者為主後者為客也同氣者謂久病變證一氣輾轉滋蔓也並行者謂病勢緩則用多味標本並治獨行者謂本急獨治本標急獨治標不得多味勢分力緩也如是者設非明於各經主脈主證則證變雜沓紛紜何以見其為客氣為同氣孰當並行孰當獨行耶汗脈正欲出汗汗出不徹發汗後脈證皆引經文而申釋之論疾診尺曰脈盛而滑者汗且出也此即陽動則汗出之義鬱氣盛發鼓激津液外出使榮衛和而邪去是正汗法也其初病脈必沉緊又有初脈浮緊服藥後兩手脈乍伏者有沉不至伏指下盛滑頻見止歇者此欲得戰汗也若此者有因陰虛乍復有因陽虛乍充是陰陽相交之機也有因寒濕痰水將化有因畜血將通有因積食燥屎將下是邪正相搏之機也仲景謂病六七日三部脈皆至其人大煩口噤躁擾者為欲解此戰汗形證也曰脈皆至是汗正出之時其脈仍歸於盛滑也傷寒論曰若汗之不徹其人煩躁短氣身上腹中不知痛處宜更發汗則愈葛根湯主之以脈澀故也王漢皋曰發汗後其脈輕診弱重診強是仍有未出之汗雖止之而不能止也夫同一汗出不徹也而脈一澀一強者一則陽氣能鼓汗自續出內經所謂脈滑者陰有餘為多汗也一則陽不能鼓營氣不盛必待用藥再發也溫熱論曰汗後但診其脈虛軟和緩雖倦臥不語汗出膚冷卻非脫證若脈急疾躁擾不臥膚冷汗出便為氣脫矣大抵虛人病鬚髮汗者全恃汗前預安其根使汗後脈平形靜呼吸停勻若汗出不止或汗與大便並行氣喘不續脈大不斂者獨參湯或生脈散入參附救之亡陰亡陽脈證辨徐靈胎曰亡陰亡陽相似而實不同一則脈微汗出如膏手足厥逆而舌潤一則脈洪汗熱不黏手足溫而舌乾但亡陰不止陽從汗出元氣散脫即為亡陽矣然當亡陰之時陽氣方熾不可即用陽藥宜收斂陽氣不可不知也亡陰之藥宜涼亡陽之藥宜熱一或相反無不立斃標本先後之間辨在毫髮舉世更無知者故動輒相反也此論可謂切矣然有不得不辨者內經曰陽氣者衛外而已固也又曰陰在內陽之守也陽脫者必陰不能守而後陽無所戀陰脫者必陽不能固而後陰無所藏二者存與俱存亡與俱亡者也故辨脈曰脈浮而洪汗出如油喘而不休形體不仁此命絶也是陰陽一時並脫之絶證也若驟因發汗太過腠理開泄必陽先亡而陰隨之未有陰在內而轉先亡者也徐氏以脈洪肢溫為亡陰謂其所見皆陽證也殊不知陽氣外越即是亡陽以脈微汗冷為亡陽謂其所見皆陰證也殊不知陰液外泄即是亡陰況且亡陰亡陽以氣液分不專以寒熱判即如過汗亡陽過下亡陰亦不過各言所重故凡先患寒下之證陰凝於內陽越於外外熱裡寒面赤足冷如白通四逆證此過下而反宜用熱者也大熱內結氣血沸騰喘汗大作津液妄泄如人參白虎承氣證此過汗而反宜用涼者也蓋嘗綜而論之以證則四肢厥逆即亡陽也繼見煩躁不得眠是陰燥而陰又亡矣身大熱而無汗或汗不止內經謂為陽脈之極即亡陰也大汗不止而身熱漸見厥逆是陽絶而陽又亡矣先亡陰而後亡陽溫熱病有之以脈則脈浮而洪陽欲亡也脈微如絶陽已亡也脈洪而按之無根陰欲亡也脈微而來如雀啄陰已亡也大抵先亡陽者亡其陽之半撤去陰之藩籬然後陰亡而陽即與之俱盡矣先亡陰者亡其陰之半擾動陽之根株然後陽亡而陰即與之俱盡矣其可及施治者皆先亡其半之時也其後陰陽同時並離無從措手而其證亦難剖析必陰必陽矣有經絡之陰陽有臟腑之陰陽先亡其半者是經絡之陰陽也亡陽藥用熱是以熱為主亡陰藥用涼是以涼為主非純熱純涼也仲景於白通四逆證皆有加膽汁人尿例舊解謂慮其格拒故熱因寒用也殊不知此時真氣已微極矣尚有何力能格拒耶只因亡陽者陰必搖若用純熱以回陽則陰又被灼而陽更無根矣觀其云脈微續者生暴出者死不敢用純陽之劑正預慮及此耳亡陰之治不可專用純涼亦猶是矣復脈救逆皆其類也復脈救逆是治傷陰與亡陰尚隔一層如汗後遂漏與惡寒者桂枝附子湯主之是亦傷陽之治也外感夾內傷脈辨陶節庵曰外感夾內傷者甚多有因勞力辛苦內傷血氣又兼外感寒邪此為勞力傷寒其脈必左手緊盛右手雖數大而無力其證必有骨髓痠疼脅痛微汗頭疼微渴倦怠懶言必以溫補兼發散藥中求之有下證者宜緩下之宜於下藥中佐以補氣生津有痰挾外感者左寸緊盛右關洪滑或寸脈沉伏其證兼有喘嗽頭疼骨節疼即是夾痰傷寒必以痰藥兼發散藥中求之後以消痰降火之劑收功熱痰必煩躁譫語治宜清火寒飲必脅痛嗆咳治宜溫中有食鬱夾外感者其脈左右俱緊盛有力其證必噫氣有酸惡聞食臭或胃口作痛心下痞滿噁心或欲吐不吐必以解表藥為先後以消食繼之王叔和曰食痹者食物即痛也傷熱物則能食東垣亦有冷熱之辨甚詳若兼見脅痛脹滿體痛氣鬱不舒時自太息左脈緊盛右脈沉者則知是夾氣傷寒也兼見心胸脅痛小腹有痛處不移煩渴小便自利則知是血鬱內傷外感也又有夾陰傷寒脈沉足冷面赤身熱或躁此冷極於內逼其浮陽上升也與陰虛戴陽又不同急用麻黃附辛湯溫散裡寒醫者多不能識誤死甚衆有夾陰中寒脈沉足冷面青小腹絞痛急以吳萸四逆湯溫之有直中三陰傷寒初起無頭疼身熱口不渴反惡寒肢冷躇臥或兼腹痛吐瀉或戰栗面如刀刮或吐涎沫輕則理中湯重則即是中寒四逆湯溫之此陶氏條列傷寒內虛之脈證悉矣以豫所診外感雜病挾虛者甚多所謂虛者陰虛者也今將脈象分別處略具於下以備遺忘凡風寒濕寒從上從表受者其脈之浮分必有一層皮殼指下微硬兩傍有邊成線起伏不大應指微有力略按則皮殼不見矣其脈即漸窄反不及上面之寬矣卻又兩傍無邊散漫不能成線再重按則不見脈矣此外感寒輕而內虛無邪者也若外感寒重者即為傷寒已略見前陶氏所論中茲不復贅但其脈浮分皮殼甚厚邊線甚徑按之不能即斷耳所謂浮分者以指面初到脈上為準凡寒重者浮分多不見脈故不可泥凡風寒濕寒從下受者其脈之浮分不見皮殼或有邊或無邊應指無力約略中線稍硬略按則中線在指下漸徑起伏不大而脈形窄矣再重按則僅留中線如絲指下梗梗無起伏也此下感於寒而內虛無邪者也所謂無邪者無夾痰夾食夾宿疾癥瘕疝痛等病也有之則必見甚滑甚弦甚澀甚細與新病與本體不相應之脈痰食為新邪多見於中候癥疝為痼疾多見於沉候見於浮分與外感之寒合其皮殼必更厚見於沉分與下受之寒合其線必更徑凡久受風寒濕寒漸漬筋骨之中年深歲久但覺遍身痠軟骨節不便漸漸內侵臟絡時作嗆咳胃陽被抑漸成痰飲口淡食少四肢胕腫日久脅痛背痛胃脘痛肩胛髀腨盡痛時發寒熱頗似外感不禁風寒不任勞苦呼吸短氣大便溏泄小便赤澀面色痿黃神識昏迷直與勞損相同若加感新寒便作咳嗽喘促醫不知其寒濕深入骨髓而仍用清肺撲滅微陽遂致哮逼不舒下利不止而死矣此病浸潤漸漬非一朝夕之故寒濕深入骨髓其脈必細而徑不能浮不能沉此寒痹濕痹之痼疾也治法惟用極溫散之峻藥略佐溫補緩服長服使藥力搜入筋膜骨髓則里證漸化為表證邪可托出而病愈矣而近世病家往往責效於湯劑數帖之間醫家亦不能實抉其抵里使病家深信以成大功可恨凡受風熱則陰虛之人刻不可堪如傷暑相似自覺外而周身內而三焦五臟皆開散而不能合大氣無束孔竅生煙呼吸喘促時時自汗何者陰虛則血液皆燥不堪風熱之灼也其脈芤而散與暑脈亦近治法卻不宜白虎而宜葳蕤湯之類凡受濕熱則陰虛之人必更四肢軟惰胸膈痞悶飲食不進力咳痰稠其脈轉見長緩來去從容亦能有力乍診直是無病而不知其人陰虛本脈必是芤薄無力今濕入而據其陰斯芤薄變為緩軟矣熱入而據其陽斯無力變為有力矣雖與平脈相近而細審其來去往還之間必有怠緩滯澀之意又與常人陰分不虛者之傷風熱其脈更有難辨者大抵重按必有不同常人傷風熱其浮分鋪散而沉分如常流利也陰虛傷濕熱其浮分當稍斂而沉分必呆板不靈熱勝於濕更渾渾不清也再論痹數之義郭元峰論虛數拙著直解補論痹數詳矣今讀傷寒不可下篇二條乃知氣結者脈多數不獨痹也愛録其文而釋之曰脈數者久數不止止則邪結正氣不能復正氣卻結於臟故邪氣浮之與皮毛相得脈數者不可下下之則必煩利不止此謂脈數若真熱者當久按而不止今重按久之而漸衰是非真內熱矣止猶俗言有限是數止見於浮也因邪氣盤結搏於肌表正氣不得復其出入流行之常度退避而內結於臟故其脈之數僅浮之與皮毛相得也下之則傷在裡之正氣而津傷氣陷矣故煩而利不止也又曰脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數為亡血浮為虛數為熱浮為虛自汗出而惡寒數為痛振寒而栗微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅振寒相搏形如瘧狀醫反下之故令脈數發熱狂走見鬼心下為痞小便淋瀝小腹甚硬小便則尿血也此謂單持關前見濡關後見弱總按浮上見浮沉下見數夫浮與數主病非一也今浮為虛其證自汗出而惡寒是表氣不固也數為痛其證振寒而栗是裡氣鬱積不暢以致內痛而栗也夫脈則微弱見於三關內證則胸中為急呼吸牽引脅痛外證則寒熱如瘧此陽氣不充不能通行周身而卻結於臟其象顯然醫者正當調其榮衛如東垣補中益氣之意乃反下之津液愈傷遂成胃虛之脈數陽越之發熱而變見氣脫血燥諸證矣二條皆正氣內結而一浮數一沉數者前條是表有邪而內不甚熱其數乃邪氣不得出路逼迫不安所致所謂邪氣怫鬱在表也治宜建中桂枝之類後條表無邪乃衛氣衰微內陷與內臟自起之微寒相搏也確是補中益氣證二者皆與痹數相發其脈雖速而來去必短迫促不舒故數或讀若促也金匱水氣篇數脈即止義正如此徐注謂衛氣止於下也亦謂衛氣不能外鼓由於寒氣內生以致其脈來去逼迫似有格拒抵觸而止不得前耳數促音義並同自昔注釋脈書者未嘗有數與促同之説竊觀內經仲景書中此義多矣促者蹙也迫也促脈者起伏不大而其勢躁疾素問所謂促上擊者是也數之音索者一息六至與遲相反音促則其義即同促矣書中音索者多與大並言與遲對言音促者多與動並言與微對言素問曰數動一代者病在陽之脈也仲景曰大浮數動滑此名陽脈也沉澀弱弦微此名陰脈也後人誤以數音索而怪陰脈名中不列遲脈亦未之思也仲景曰諸脈得數動微弱者不可發汗又曰微數之脈慎不可灸又曰傷寒咳逆上氣脈數者死謂其形損也又曰脈微而數中風使然又曰百合病其脈微數以上諸文試以促義解之於事理不更順乎且金匱曰吸而微數其病在中焦實也此非言脈也而其義之為促更皎然矣孟子數罟不入汙池讀作促注謂密也夫密者以其相逼相擠而言之也促之為脈來去暴跳迫促不舒亦正有密之義後世以促為數中一止遂專於止中求促而不知止者促脈之偶然也非促脈之本義也按古人促止之説當即金匱數脈即止之義非脈之自止乃脈之躁疾暴跳似有物以止之而不得來高去深如鳥之躑躇於樊籠故詩日蹙蹙靡所騁是否他日遇高明質之再論散脈虛實上卷散脈條中謂散有虛實細讀內經脈經散脈諸條多主實證則實散之義不可不究也試再論之虛而散者浮大而按之無根也若如麻子氣已絶矣實而散者其脈但兩邊滲開與肌肉無界限故嘗有浮候弦長重按根腳鋪寬不能圓斂者此血虛內有蘊熱也凡冬不藏精伏溫感新邪而發病者其脈莫不如此又有肝腎血少內熱元氣不能攝納根本浮動上氣喘促脈來浮候軟弱中沉散漫無邊應指振撼如喘狀是周身之氣皆喘動矣內經所謂軟而散喘而虛皆是脈也治宜得丹溪苦寒培生氣之意若例用鹹溫甘熱如腎氣丸之類溫補下元以冀攝納是促其期矣試思有氣血果寒而脈形反能寬縱者乎又有浮中渙散重按卻見弦細者此下有久寒而脾肺氣鬱化為燥熱也治又宜溫下佐以清上斂肅浮陽使之內合又有浮沉俱不見脈獨中候滿指俱動一片模糊稍按指下即斷如芤之伏此肺腎之元氣皆虛而中樞不運升降不利濁氣鬱於中焦者也治又宜脾腎陰陽同補建中納下並用是因虛而生實故也凡風邪入中皆令脈散風善化熱化燥故入肺則氣喘而脈散入胃則嘔噦而脈散入腸則飧泄下血而脈散所謂腸風也入肝腎則或少腹脹痛或泄瀉癃祕腰脊痠疼此皆久風之化燥傷血者也大抵虛散由於氣血之敗實散由於氣血之燥故其主病為溫為喘為痿為中暑為癰疽瘡瘍癍疹上所論實散皆指脈形寬泛者言之更有脈體堅實而指下斷續不見條直之形似有無數麻豆亂擊卻又不得為死脈者以其起伏分明應指有力此痰結胸中大氣不能條暢者也其主病為咳為痛為隔噎為痞滿為驚悸怔忡為魘寐為多夢紛紜前之散近於洪而不數不盛此之散近於動而不滑不疾脈弱非虛每見溫熱傷寒瘧疾其人凝痰瘀血阻於經絡宿食留飲塞於膻中氣機不能流利大氣不得旋轉而抑鬱停結脈來遲弱應指無力不知者以為邪實正虛陽病陰脈法在不治而其實非虛也郁也正氣抑而不得伸也去其壅則脈盛矣且氣鬱之弱與氣虛之弱亦自不同氣虛者無論是沉是浮其體必薄其勢不甚內吸氣鬱者不見於浮而見於中沉之分其體按之不絶而力能內吸但為邪所阻不得上挺耳前謂痰血食飲是有形之邪也亦有肝熱橫逆胃濕薰蒸肺氣失其清肅不得下降致令胸痹難於布息者此無形之邪也其脈亦濡弱且不甚內吸而其勢總非頽然如不欲動者甚或指下微見躁疾之意此濕熱之病也濕熱則筋絡縱弛脈體本緩而氣又鬱結宜其弱也故仲景曰諸弱發熱若寒而鬱者脈必緊澀矣馬元儀印機草曰三陽病脈當浮大而微弱不起者以邪熱抑遏不得外達非陽衰脈微之比待清其壅則脈自起矣此可謂通明之論矣但不指明陽衰之弱與抑遏之弱所以不同之真象將使後人何所據而見其孰為壅孰為衰耶張石頑亦有治傷暑停食六脈虛澀模糊因胸硬舌刺而決其內實者至於邪去則正亦虛而脈轉見弱更為事理之宜不足言矣絃動細滑皆少陽脈少陽為樞百病惟少陽一經脈證變幻最多世謂少陽居半表半裡此不必拘於部位言之也當從半字上著想所謂半者以其雜也凡病邪正相爭虛實相錯上下相間內外相敵寒熱相侵陰陽相搏氣血相亂皆半之病也凡脈兼見一陰一陽一表一里皆半之脈也故人患六淫二三日後邪氣稍內陰陽戰矣即屬吵陽其脈多弦細滑數見於中沉之分若熱盛者遂見動而大也葉天士溫熱論曰氣病有不傳血分而邪留三焦猶之傷寒之少陽病也但數動與正傷寒不同謂脈數而動不似正少陽傷寒之弦細也此可見少陽有動脈矣夫絃動者陰加於陽細滑者陽陷入陰皆由膻中大氣不能上下表里流通之象也即三焦之鬱而傷也動者其氣如有所制不得出而又急欲出者也史載之曰人有兩脅下非時氣痛不安如生積聚此為肝涎與血相搏其脈必洪大沉實而有骨力凡肝熱生風而痛脈當弦長反洪大沉實者此為涎伏之也此絃動同胎之義也車質中曰滑之為脈因其氣不得舒故脈軋軋如珠故凡內熱而寒伏之則氣鬱勃於中而脈見動矣上論絃動下論細滑又有傷寒胸脅滿悶飲食不下口苦顱脹寒熱時作其脈細滑見於中沉指下躍躍來去不大又有寒熱病後津液未復濁痰未降胸膈不舒每日仍略見潮熱汗出口苦其脈亦細滑又有熱入血室神昏譫語或目閉不語肢墮如尸此包絡之津液為熱所灼而燥結神機不能清利也其脈亦細滑此皆三焦傷之類也其所以細滑不似動脈堅大者動脈三焦之郁鬱於有形之濕熱細滑三焦之傷傷於無形之燥或病後之餘熱也一津液壅而氣鼓之一津液燥而氣陷之也皆一陰一陽之兼脈也夫陽虛而三焦之氣不行者其脈弦陽盛而陰氣制之以致三焦之氣不行者其脈動陰虛而陽氣陷之以致三焦之氣不行者其脈細滑釋鉤凡以軟皮作管而以水激入其中管中空淨無礙則水能直達若有阻滯則必屈曲而進而管亦為之屈曲矣此有物挂礙於管內之兩邊者也其形如蜿蜒若阻閉於管之正中氣至即衝開節節有閉節節沖之氣行屢觸而管為之振撼矣其形如戰栗故脈形之屈曲與脈勢之振撼皆濕熱盛而痰多之人所常見之象皆脈氣因滯而激者也凡兩人以手引索而撼之則其索之彈也必不能正上正下而或左或右矣故左右彈者緊脈之本象寒氣束於脈外者與屈曲戰栗本非一類前卷緊脈條內有論蜿蜒屈曲之脈附隸於左右彈者以其相似而辨之非以其同類而合之也當時本從臨診體驗得來非襲取舊説也今讀張石頑書有曰火盛之脈若中宮有物阻礙則關上屈曲而出膈上有痰凝滯則寸口屈曲而上總謂之鉤如無阻礙決無屈曲之脈矣又解脈來懸鉤曰按之旁至似有微曲之象觀於此説脈之有屈曲也不校然乎第以此已即夏鉤之脈則有大謬不然者內經以喘喘連屬其中微曲為心病脈以前曲後居如操帶鉤為心死脈所謂曲者乃指脈氣之起伏循環故內經謂鉤脈者來盛去衰如夏日萬物既盛皆垂枝布葉下曲如鉤也蓋脈氣起伏高深如一其勢圓轉如環鉤脈去衰不能及底不似環之圓矣鉤即環之缺其一面者也是主起伏之高深非主形體之曲直也喘喘連屬其中微曲是其脈來連連上擊旋伏即起僅微見其還返耳前曲後居如操帶鉤前後以脈氣之前至後至者言是脈之初動微有鼓伏既應之後即挺亙不移以曲喻鉤以居喻帶耳曲與居對居即不曲之謂也且平心脈曰纍纍如連珠病心脈曰喘喘連屬其中微曲而平腎脈亦曰喘喘纍纍如鉤是鉤也曲也顯以其喘喘者言之也喘喘者未伏即起之象加人之氣喘出多入少者若果指脈形之屈曲其曲決不能如鉤之甚經必不以鉤名之矣何者天下自古無形曲如鉤之脈也即病脈且無之況為四時之正脈耶且心病脈之僅見微曲心死脈之竟至後居皆以曲為善以不曲為惡也不察經文之意而轉加罪於曲將必脈氣有出無入而後為正耶自宋以來講脈者只論形不論勢故夏脈如鉤一語各名家皆未嘗從來盛去衰上著想且如石頑之説無阻礙即無屈曲然則夏脈之鉤乃有阻礙之病脈耶上卷論四時弦鉤毛石之文作於五年之前今復辨於此以質之來者冬脈如營營乃牢固之義也凡兵所駐日營盤謂牢實盤踞也此極淺之説而遍讀前書只論冬石未有議及營字之何義者豈以其易曉無待詮釋耶説神脈貴有神由來舊矣其説約有數端一曰應指有力也一曰來去從容也一曰來去如一也亦曰陰陽俱停陰陽同等一曰形體柔和也四者固俱本聖經而皆有似是而非之處不可以不辨所謂有力者謂其氣來應指之際充然有餘而無怯然不進之象若謂搏擊滑大失本意矣所謂從容者謂其來去中途和緩而無一擊即來一掣即去躁疾不安之象若怠緩之脈其氣來至中途而不欲前去至中途而即欲止豈從容之謂耶所謂如一者來能高滿於其分去能深極於其底而無來盛去衰與來不盛去反盛之嫌也若來如釜沸去如弦絶則非是矣形體柔和者真氣充於脈中而脈管之四傍又與肌肉相親也外緊中空內結外散均非是矣獨是四者之義乃指平脈之神非病脈之神也病者正氣若虛應指豈必有力況乎陽盛陰衰陰盛陽衰血虛氣實氣虛血實又豈能來去從容如一而柔和耶然則何以見其神也聖言神妙萬物平脈之神尚難揣摹病脈之神孰能擬議神不可言言神所見之處可乎前人謂應指有力是脈既動之後也吾謂神不在既動之後而在方動之初其來也意似浩然湧出無力倦不能來與迫欲急來不安於內之情其去也意似坦然折入無怠不欲去與應指即散不見其去之象如此則應指即令無力即令不能從容如一而柔和而神自卓然在也來去二者之中又以去為尤要何者去乃真陰之內吸也若回折有勢如石投水是陰氣猶全元根未撼此察神於方動之頃也內經曰靜者為陰動者為陽所謂靜者脈氣方停未來未去之間也察其未來之先停於下者之久暫而知真陰之盈虧即可知真陽噓力之盛衰也察其既來之後停於上者之久暫而知真陽之衰旺即可知真陰吸力之強弱也此察神於未動之始也方來也方去也未來也未去也皆神所流露之處也聖經未嘗不明言之但後人讀書不能領會今略為拈出以俟來哲之發揮豈敢謂義盡於此耶至於神之發源生於胃氣本於命門前人論之夥矣不煩絮聒動脈有強弱附釋驚悸辨脈曰陰陽相搏名曰動陽動則汗出陰動則發熱金匱曰寸口脈動而弱動則為驚弱則為悸夫動者緊滑並見之脈也緊為陰強滑為陽實凡寒熱邪正之相激榮衛表裡之不和多見此脈故曰陰陽相搏也前於少陽脈篇詳之矣此固動之有力者兩強不肯相讓而後動何以有強有弱耶蓋凡脈皆有邪盛與正虛之兩途動之形堅而力強者邪盛也動之力弱而形不堅者正虛也其病皆屬於寒熱與濕皆在於心膽與三焦熱邪入心則發為驚狂此心火本盛而寒水之氣從外撲入熱積於心不得舒發故其脈動而搏是兩強激搏之所致也心火自衰寒水侵凌陽氣不伸其脈纍纍如珠應指無力其病為怔忡嘈雜之證故曰悸也是痰飲淫泆膻中之所致也二者皆謂之心痹其兼證必面色黧黑夜寐夢魘治宜溫宣心陽散化水飲三焦之氣通利膻中之位廓然氣化無格拒脈象自無斷續矣竊嘗綜紀臨診以來所見動脈主證在左寸為驚悸為夢魘在右寸為咳嗽為喘促在左關為水氣入肝其證腰疼脅脹冷氣上衝胸中此里證見者多難治表證則寒熱往來如瘧也上為嘔吐下為淋濁在右關則為脾胃多痰傷食嘔酸勞倦目胞下垂肢怠思臥在兩尺為寒濕從下上犯入於太陽少陰之經髀腨胻足腰脊痠疼甚者命火為寒濕所激而上衝與心火相搏而為驚狂下厥上冒遂致兩脛厥冷兩膝內痛或內為疝氣白淫矣三部皆動是為瘧疾為痰飲腫脹是三焦之氣皆逆也癲癇癥瘕積聚疝氣奔豚中風痿痹夢交精濁勞損皆有見動脈者其機總不外鬱結與交爭而已矣郁者解之爭者和之故吾謂動脈之治宜從和解但當細辨緊滑二脈之孰多孰少以定用藥寒熱之輕重耳金匱曰動曰弱云者驚者寒較多則緊為甚熱較多則滑為甚是邪正相爭也悸者邪氣盛則形堅而力稍弱正氣衰則力弱而形亦不甚堅也至於命火衰熄寒水盛結之敗候其脈必形甚堅而力又甚弱起不能高去不能深起伏之間有搖擺之狀如人之力弱舉重者然是元根已拔其病必不止驚悸矣詳具簡摩第四卷動脈篇補引諸文中茲不復贅本集動結滑澀諸篇散脈虛實篇少陽脈篇亦皆可參觀也驚者語言舉動躁急無次變其常度也內經曰因於寒起居如驚又曰三陽一陰太陽脈勝一陰不能止內亂五臟外為驚駭又曰二陽一陰發病主驚駭背痛善噫善欠名曰風厥又曰少陽所至為驚躁瞀昧暴痛傷寒論曰傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者救逆湯主之此皆水火相激之事也凡陰出之陽則怒動者怒之象也故驚之證發於外傷寒論曰發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之又曰脈浮數者法當汗出若下之身重心悸者不可發汗當自汗出乃愈所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈又曰傷寒脈結代心動悸者炙甘草湯主之代之為言弱也結代即動之弱而無神者此皆衛陽內陷真火不揚之事也故悸之證在於內脈象叢説十條按此十條或論脈體或論診法或論病脈皆前人未經暢發者脈有兩側脈要精微論曰尺內兩傍則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中王冰云兩傍兩尺外側也李中梓曰內外二字諸家皆説兩側此必脈形扁闊或有兩條否則於義不通矣觀易卦六爻自下而上上三爻為外卦下三爻為內卦則上下之為內外不昭然乎故內者每部之後半部也外者每部之前半部也李氏之解經誠新穎矣然脈實有兩側診法非扁闊與兩條之謂也凡指平按脈上其形如此及側指內側拍之而其形如彼及側指外側拍之而其形又如彼矣此可以脈之緩急滑澀察病之虛實寒熱內側主裡外側主表只可取以與正脈合參不能專恃此以決病亦不能如正脈之分二十八脈各有主病也吾每診正脈微弱側診弦而兼滑則知有痰飲矣其微弱乃氣虛又為痰飲所困耳又如外側見弦內側見滑便是表寒裡熱與浮弦沉滑同斷余仿此頃讀韓氏醫通有云左寸指法按如六菽之重在指頂為陰屬心在指節為陽屬小腸餘部仿此此即兩側診法也但不言側指內側指外而言指頂指節似從正面平按未免蹈李氏扁闊兩條之消矣脈有內曲外曲脈要精微論曰推而外之內而不外有心腹積也推而內之外而不內身有熱也所謂外者脈外近臂前廉手陽明大腸脈之部也所謂內者脈內近大筋手厥陰心包脈之部也是脈形之弓曲或外贏或內朒也寒結之則脈形內曲熱鼓之則脈形外曲與小兒診三關脈紋內外之法其義同陰陽別論曰陰陽結斜多陰少陽曰石水少腹腫向來注者罔知斜曲之義夫結者堅而澀也斜者如弓之曲也多陰少陽者謂其斜之弓曲向內近於少陰而遠於陽明也石水少腹腫是為單腹脹即心腹寒積之類也張石頑診趙明遠曰左手三部弦大而堅從人迎斜內向寸是為三陽經滿溢入陽維之脈也當有顛仆不仁之虞所謂斜內向寸者必先外越乃折而內向上寸也三陽滿溢即內經身熱之類也脈經曰從尺邪入陽明者大風寒熱也大風歷風亦曰寒熱詳見風論邪入少陰者女子漏下赤白男子溺血陰痿不起引少腹疼是正氣虛則內曲邪氣實則外曲也扁鵲脈法曰外勾者久癖也內卷者十日以還是又以內曲外曲分食積之新久也大抵脈之曲者皆因於積而又中氣虛也偏於熱多則外撑偏於寒多則內倚嘗診一婦病胃脘痛過服泄氣之劑右脈內倚藏於筋下左手弦徑問之曰左腹素有塊也用溫元補中二劑而脈復常矣惜相信不終病訖未愈脈有兩歧三歧凡人寸口之脈本有三歧而向無三動三歧者一由寸口直上白魚也一由寸口內入掌心也一由寸口外上合谷也詳見靈樞邪客篇已録入前卷三關脈體考茲不復贅其動也或見其一或見其二未見有三脈全動者獨見一脈其形多粗兼見二脈必然一大一細倘兩脈並大當有風火上壅之患矣脈經曰從寸口邪入上者名曰解脈來至狀如琴瑟弦苦少腹痛女子經月不利孔竅生瘡男子病痔左右脅下有瘡內經腰痛論有解脈之名王冰曰不合而歧出如繩之解股也斜入上者內竄包絡之脈也諸證悉由火氣刑金肺大腸之傷也大抵木火盛而亢逆於金乃見此脈有乍見此脈者熱痰風火上壅無疑即生而如此其人亦必木火常干清道如頭暈心煩燥渴祕結之類此條與三關脈體考參看乃全又按巢氏病源候論黃疸候曰人肘屈前臂上有三歧脈其中脈名手肝脈病疸者若此脈壞而不見則不治此言絡脈非動脈也脈經曰病疸寸口近掌無脈不治此言動脈非絡脈也解者或誤合為一則失之脈有雙線雙線與兩歧不同上卷三關脈體考已言之矣雙線必一大一細未見有兩線並大者或細脈加於大脈之上或細脈伏於大脈之下或兩脈平行大居細外細居大外嘗診寒濕脾敗下瀉上喘浮之細脈滑疾重按大脈堅牢挺亙無甚起伏此虛陽外浮死陰內結也又嘗診身生瘡疥浮之細脈滑疾重按大脈緩弱此風熱搏於表也又嘗診下部生瘡浮之大脈散弱重按細脈滑疾此濕熱深蘊於營分也故據此以辨表裡尤為顯然而無遁者其在平人細脈常弱於大脈重按即不見也此條與三關脈體考合看乃全脈有動搖此所謂動搖是脈之本象非加緊脈之因病而見也扁鵲曰少陽之脈動搖六分正月二月王太陽之脈動搖九分三月四月王陽明之脈動搖三分其至跳五月六月王少陰之脈動搖六分七月八月王太陰之脈動搖九分九月十月王厥陰之脈動搖三分十一月十二月王此動搖之本於自然者也夫常脈之動搖人人所共有亦人人所必有必有動搖而後見其氣來之盛也須於指下脈來應指初回之際細審之自見矣泰西有審脈表凡脈之起而將落未落旋轉之際必有振撼之迹此氣之噓力大盛與吸力兩相激蕩之勢也若緊脈熱為寒束其動搖即在脈勢初起之始乃熱力與寒相搏脈形挺亙故動搖之勢益顯世遂以動搖專屬之緊矣更有濕熱痰盛氣鬱而搖者氣不暢也有腎熱水沸氣喘而搖者氣不靜也有命火脫泄氣怯而搖者氣已無根如人之力弱而舉重也脈有頭本內經曰脈之動也陽氣前至陰氣後至辨脈曰脈來頭小本大者名曰覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿蓋脈之來也自筋骨之分而上於皮膚之際乍擊於指引陽氣之前至也謂之頭既應於指而脈尚未去橫度指下此陰氣之後至也謂之本有來之初勢有力而旋即衰弱不見脈氣之橫趨者此頭大本小也有來之初勢不甚有力而旋見脈氣湧湧續上者此頭小本大也脈如曰動前脈盛氣有餘動前脈衰氣不足應後脈盛血有餘應後脈衰血不足此正與頭本之義相發明也故頭本者就脈來之際分前後以別陰陽氣血非謂來為頭去為本也舊説有指為寸尺指為浮沉者皆未合云脈有俯仰平人之脈寸浮尺沉關脈在中診時食指略輕名指略重此常法也若所謂俯仰者或寸沉尺浮是前俯後仰也或寸更浮尺更沉是前仰後俯也此三部之俯仰也又有一部二部前後相為仰俯此皆常有之事業道者不可不知脈經曰從少陰斜至太陽者陰維也尺沉寸浮動苦肌肉痹癢僵仆羊鳴手足相引甚者失音不能言從少陽斜至厥陰者陰維也尺浮寸沉動苦癲癇肌肉淫痹汗出惡風此前後俯仰之專脈也二維有病即見此脈其實尋常診脈多用此法以審氣之升降強弱奚必二維耶又內經陰陽結斜多陰少陽其義亦可通此謂尺寸脈緊澀而傾斜前仰後俯浮少沉多所謂肝腎並沉為石水也扁鵲曰不俯不仰不低不昂此為平脈此俯仰二字所本也脈有散漫無邊脈體所以長直者以有管束之也無管則不成脈矣故書以為脈而見散其人必死為其氣不充也乃尋究生平所診竟有生而脈體散漫似其氣充管中又溢管外不見邊際者此脈多見於關亦有見於寸獨尺部尚未之見蓋尺部之內肉多堅厚寸關之分皮薄肉淖其脈管有因而寬弛者浮沉俱無脈形指下一片滿指俱動起伏有力長年如此略無病苦非稟賦之獨殊耶至於主病則脈經有曰關上脈襜襜大而尺寸細者其人心腹冷積癥瘕結聚欲熱飲食是也至於患風熱濕熱者脈多渾渾不清中堅邊散又見有病後餘熱未清濁氣未降胸膈痞悶飲食少思其脈來弦細見於中沉之分指下堅滑而正形之外卻又有滿指振撼之勢看似脈中之氣溢於脈外實則脈外細絡濁氣膹郁膨急因為脈氣牽引而俱動也謂之脈暈診此者不可疑是散脈經曰來調四布欲病水也四布即暈也欲病水者濕濁壅盛也此濕盛氣滯渾渾不清之脈也脈有隱伏不見伏脈謂之六陰有極沉細者有並沉細而無者皆常脈也但有一手如此者有兩手如此者有六部正位如此而尺澤之下仍見脈者更有關尺見脈而兩寸獨伏者此當退一部診之以關為寸以尺為關以尺後為尺也又嘗診皮急肉堅者兩尺脈藏肉下不見診時須審關脈後半部是否深與尺通再單指重按尺部以意測之脈有無數細絲此痰脈也氣過指下似覺拖帶黏涎宛然中有無數細絲此心包絡與肺胃之有痰也必有嘈雜惱憹呼吸不利之證此余所身歷者也若常見此脈且兼洪弦又貪厚味多房室身肥項短時覺骨節不便胸膈不舒眼目少神夢寐不安久必有類中風矣此脈形勢介在滑澀之間而實不可以滑澀名也痰多氣弱故其形似滑而其勢甚澀也王叔和以系水交馳為死脈真陽盡而脈中津液悉化為痰也系水者懸水多股即無數細絲也素問脈至如弦縷縷字止言其細非言其多也不可強為援據其絲忽斷忽續而不聚故遂主死矣讀脈雜説説至內經脈經論脈文中有所謂至者揆其義不可以來至通也私揣當訓沉搏與動字之義相近前人未嘗論及茲請聚其文而觀之經脈別論曰二陰搏至腎沉不浮也此言少陰脈搏而沉以腎氣之本沉不浮即所謂腎脈如石其氣沉以搏者也故又曰鼓陽至而絶曰石絶極也謂脈來沉搏之極也蓋並言搏至者其義為沉單言至者且該沉搏矣仲景曰病六七日三部脈皆至其人躁擾者為欲解也此內經陰出之陽則怒之義也脈經引扁鵲曰附陽脈強附陰脈弱至即驚實即瘛瘲此謂凡平人脈重按至沉其形必弱若不弱而搏至緊實即為諸病也金匱要略動則為驚又內經曰渾渾革至如湧泉脈經曰脈與肌肉相得久持之至者可下之是非沉搏之至而可以來至之至通之耶難經損至之至又別一義説懸絶懸遠也異也甚也絶極也絶類離群之意也內經論脈有曰懸澀懸小堅者即甚澀也甚小堅也曰盛喘數絶者即盛喘而數極也曰肝至懸絶急者肝真臟脈至異常之極弦也其心至懸絶脾至懸絶肺至懸絶腎至懸絶四臟不繫本脈者可例而知也曰不懸絶而不繫脈象者是渾言其不拘何脈但不至異常之極也曰弦急懸不絶者弦急之甚而未至極也懸猶輕而絶至重然凡單言絶者其義往往或與懸同單言懸者其義亦往往賅絶在內並言懸絶者莫非極大極小異常之逆脈也若夫所謂絶不至乃脈息之歇絶也所謂如弦絶如瀉漆之絶又脈形之斷絶也王冰於懸絶諸文皆以如物之懸而斷絶釋之恐未協耳素問此文甚多不能備録僅舉其略如此説伏鼓鼓者鼓搏有力之謂也而伏鼓二字連稱素問經脈別論大奇論屢見之實不過去來之義耳伏者脈之去而伏也鼓者脈之來而鼓也曰外鼓大者即謂脈之來大也曰沉鼓澀者即謂脈之沉而來澀也前人概以沉伏鼓搏釋之於上下文義每閡而難通是求深反淺不知古文迂拙之體也説雍滿大奇論有腎雍肝雍腎滿肝滿之文滿之義為洪大以脈言之雍之義為壅實亦以脈言之也甲乙經作癰後人遂以臟癰釋之矣夫滿為勢盛而其形未嘗不實雍為形實而其勢未嘗不盛二者後世所謂弦大也故主病為腫為喘而兩胠滿為不得小便為少腹滿體胻大為癇瘛筋攣古文迂拙如此後人以二十八脈印定眼目遂少見而多怪矣仲景高章卑惵亦猶是也説微脈之微有二形之微小也力之微弱也此皆作實字解其作虛字解者不甚之謂也仲景書中微緊微緩諸文皆不甚之義而後人每以微脈釋之方中行已致辨矣素問春胃微弦曰平王冰注曰微似弦不謂微而弦也是必當時已有誤解者不然此等淺文何煩訓詁耶説人迎氣口李東垣謂古法以俠喉兩傍左為人迎右為氣口彭用光以魚際背骨縫中動脈左為人迎右為氣口其説雖新而皆無據且背後脈仍與寸口脈通有何分別人迎氣口聚訟紛紜訖無濟於實用以余歷診所驗約有二端其一即兩手分診法是專指痿厥偏枯虛損久病榮衛積於一偏之所致也其二當以關前關後分診之內經惟動腧篇確以人迎屬之結喉余如至真要大論言人迎與氣口大小相應命曰平人下即接敘尺寸不相應之事終始篇言少氣者脈口人迎俱小而不稱尺寸也此與通評虛實論脈虛者不象陰也文氣相同謂不稱尺寸之常脈也不但主中主外及春夏人迎微大秋冬氣口微大俱幹事理相合即人迎盛緊傷於寒氣口盛緊傷於食亦有合於尺寸之診也且一倍二倍三倍分候三陰三陽之義亦覺有著落矣況內關外格更與難經覆溢之旨協耶説損至精消孤虛搏至極也如人極馬倦之極難經損脈極遲真陽內減故曰損也至脈極數真陰外薄故曰至也素問脈要精微有餘為精不足為消應有餘不足為精應不足有餘為消精即至之義也故曰有餘消即損之義也故曰不足精非真有餘也脈之應有餘而正氣實不足消非止不足也脈之應不足而邪氣仍有餘也玉版要論搏脈痹躄寒熱之交脈孤為消氣虛泄為奪血孤為逆虛為從此謂搏脈乃主痹痛痿躄寒熱交爭之事是氣壅爭於脈中也若脈孤者是細緊不與肌肉相親脈訣所謂寥寥入尺來也主陽氣之虛故曰消也泄利為奪血陰虛脈見虛大乃為與病相從見孤者是陽亦熄矣得不謂之逆乎大奇論脈至如搏血衄身熱者死脈來懸鉤浮為常脈此謂血衄身熱脈搏者以其氣血之逆亂也若但脈來甚鉤而浮鉤乃來盛去衰之夏脈也此血熱之常脈不得謂之搏矣以明搏脈堅擊無胃氣與懸鉤浮不同也此數書舊解多未軒豁聊記所見如此待質高明而正之舊有以脈孤為消氣虛泄為奪血各五字作句者未見允協説浮沉浮沉之義有三一以部位言一以動力言一以指法言部位者脈之在浮在沉也動力者脈之盛大來極於浮去極於沉也指法者無論脈之在浮在沉而以指力初按至脈皮為浮重按至脈底為沉即如浮緊身痛沉緊內痛其實二病脈俱在沉將何以辨之吾嘗親審其脈凡見指力初到脈皮即見繃急重按至脈底反見泡軟此即寒濕著於筋脈之身痛也指力初到脈皮脈形泡軟或微見繃急而按至脈底甚見堅實者此寒濕結於臟腑之內痛也更有脈皮繃急脈底鬆軟中別挾一細線此又寒束於外而熱氣久郁痰結於內也故其證表強而內喘滿凡脈書證同脈異證異脈同之處均當推見其同中之異異中之同如此脈法失傳脈學精要之義失傳者多矣然其理其法猶或散見於內經難經傷寒金匱脈經千金方諸書中有志之士猶有可考而見諸行事也即至南政北政之少陰所在其脈不應人迎氣口之以一倍二倍三倍分主三陰三陽法已失考前人所説皆不適用然猶有議及之者獨有兩法僅於內經脈經及倉公傳中略見端倪遍考百家都無所述蓋遺忘之久矣兩法維何一三陰三陽法也一分界法也分界者即分三陰三陽之界也兩法或即一法亦未可知茲姑取經文條析而陳之內經之論三陰三陽者衆矣其在脈也至真要大論曰厥陰之至其脈弦少陰之至其脈鈞太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長是以風寒暑濕燥火之六氣言之也難經曰少陽脈至乍疏乍數乍短乍長太陽脈至浮大以長陽明脈至浮大而短少陰脈至緊細而微太陰脈至緊大而長厥陰脈至沉短而敦是以陰陽之太少言之也二者皆氣化之事其義皆有可尋猶不得謂之失傳惟夫所謂一二三也者以紀數之多寡也以紀次之先後也不曰少陽厥陰而曰一陽一陰不曰陽明少陰而曰二陽二陰不曰太陽太陰而曰三陽三陰其必有道矣經脈別論曰太陽臟何象象三陽而浮也揍其詞義是三陽之部本不在浮而此之太陽臟獨至者乃其象屬於三陽而又見於浮也陰陽別論曰鼓一陽曰鉤鼓一陰曰毛鼓者脈之來而擊指也鉤者來盛去衰之夏脈也毛者浮澀之秋脈也二脈皆在於浮而曰一陰一陽是一之為數屬於浮矣由是推之中與沉亦當各有陰陽二之數當屬於中三之數當屬於沉矣前所謂象三陽而浮者是必三陽屬沉故以而浮作轉語也是陰陽之一二三顯有屬於浮中沉者脈經曰寸後尺前名曰關陽出陰入以關為界陽出三分陰入三分故曰三陰三陽陽生於尺動於寸陰生於寸動於尺夫關前為陽關後為陰自來説者不過以為清濁高下之大義如此豈必析為三分分隸三陰三陽耶脈經乃實指之以故曰三陰三陽兩三字決非漫然言之也是陰陽之一二三又有屬於寸關尺者果明此義則夫所謂結陽者腫四肢結陰者便血一升再結二升三結三升二陽結謂之消三陽結謂之隔三陰結謂之水一陰一陽結謂之喉痹與夫三陰俱搏二十日夜半死等文皆當以部分之一二三辨之而無與於陰陽之太少矣遍考諸經迄無證據其如何按部決病之法亦渺無可稽王叔和九道之法以九候分主足三陽與手足三陰而獨無手三陽其配合部位亦與常法歧異此脈法之失傳者一也分界之法見於倉公傳者有四事而分三義齊侍御史成案曰所以知其後五日癰腫八日嘔膿死者切其脈時少陽初代代者經病病去過入入則去絡脈主病言脈代者先由經病後過經深入入則去經而絡脈主病矣絡謂臟腑所繫於身之絡也當其時少陽初關一分故中熱而膿未發也及五分則至少陽之界及八日則嘔膿死故上二分而膿發至界而癰腫盡泄而死陽虛侯相趙章案曰法五日死皆為前分界法前即謂成案也此二者氣口脈法之分界也曹山跗案曰五日死者肝與心相去五分故五日盡盡即死矣此似指五臟膜絡相去之界也宋建案曰臣意見其色太陽色干腎部上及界要腰字以下者枯四分所故以往四五日知其發也此又面部之色界靈樞五色篇之義也此三法者今皆莫能用之諸書亦無發明獨脈經引扁鵲論脈之文偶露此義曰寸口中後大前兌至陽而實者癖食小過陽一分者七日癖二分者十日癖三分者十五日癖四分者二十日癖四分中伏不過者半歲癖敦敦不至胃陰一分飲餔餌癖也此段詞旨殊不可曉喻嘉言程郊情陳修園輩幸未得見若得見之必斥為妄語矣殊不知扁鵲脈法之精真有冠絶古今者脈經所引扁鵲諸文其詞氣頗與倉公傳相近淵源有自夫豈誣也卒以句奇語重欲喻莫由分界之法不明五臟之死期無據矣此脈法之失傳者二也外此如扁鵲曰出者為陽入者為陰一出一入陰陽俱平是為無病二出一入為少陰三出一入為太陰四出一入為厥陰二入一出為少陽三入一出為陽明四入一出為太陽出入者脈之來去也出多入少則脈浮為陰病入多出少則脈沉為陽病素問曰脈虛者不象陰也謂浮而按之不實也脈經曰妊娠得太陰脈為男得太陽脈為女太陰脈沉太陽脈浮是以太陰太陽為浮沉之通稱也綜攬諸文詞若可通而法難施用竊以鄙見懸揣其義有無足重輕者有至關切要者如一陽曰鉤一陰曰毛苟得鉤毛之真象即不知一陽一陰之名可也二出一入為少陰二入一出為少陽苟得二出二入之真際即不知少陰少陽之名可也獨至三陰俱搏決非手足太陰右手之寸關也二陰俱搏決非手足少陰左手之寸尺也二陽結者豈曰手足陽明三陰結者豈曰手足太陰雖前賢莫不如此詮釋而返之私衷總覺理有可疑法不足據再四思維彼言三陰者不必專指三陰而或賅一陰二陰言之也言二陽者不必專指二陽而或連一陽二陽言之也浮中沉之三陰三陽者當以極浮為三陽次為二陽次為一陽次為一陰次為二陰極沉為三陰也寸關尺之三陰三陽者當以關前最近為一陽次為二陽上為三陽關後最近為一陰次為二陰下為三陰所謂陽生於尺動於寸陰生於寸動於尺也內經三陰三陽之文似當以此二義測之倉公分界之法亦當以此二法推之又有關前為陽浮曰一陽中曰二陽沉曰三陽關後為陰浮曰一陰中曰二陰沉曰三陰又有寸為一浮曰一陽沉曰一陰關為二浮曰二陽沉曰二陰尺為三浮日三陽沉曰三陰其曰三陰急者沉候之三部俱急也二陽結者浮候之前二部俱結也一陰一陽結者寸部之浮沉皆結也卒以經無明訓莫敢定見苦心測度終無實際有志之士所為撫斷文而太息者也六氣脈義五運行論曰天地之氣何以候之天司天地在泉岐伯曰天地之氣勝復之作不形於診也脈法謂天地之變無以脈診是也間氣何如間氣左右四氣岐伯曰隨氣所在期於左右從其氣則和違其氣則病從違指下文六氣本脈言不當其位者病見於他位迭移其位者病互易而見失守其位者病遞克而見尺寸反者死子午卯酉四歲有之反者歲當陰在寸而反見於尺陽在尺而反見於寸若尺獨然或寸獨然是不當其位非反也陰陽交者死寅申已亥辰戍醜未八歲有之交者歲當陽在左而反見右陰在右而反見左若左獨然或右獨然是不當其位而巳非交也先立其年以知其氣左右應見乃可以言死生之逆順也上提綱天地間氣指逐年客氣言所謂不診天地而診問氣者非絶不診天地也謂當隨六氣周流四時遞遷以診之不得專以天地之氣主診一歲也故曰隨氣所在期於左右歲半之前天氣主之歲半之後地氣主之是言病機非言常人脈氣如此也三個位字只作氣字解反與交乃專就尺寸左右之位言也至真要論曰厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長至而和則平至而甚則病至而反者病至而不至者病未至而至者病陰陽易者危上六氣脈已録前第二卷今更敘此以起下文是合主氣客氣言也如大寒之後厥陰風木主之其時六脈當弦矣是主氣也歲歲不易也若本歲客氣加臨少陰則弦當兼鉤加臨太陰弦當兼沉矣余類推是客氣也如據主客二氣當弦而鉤而見他氣即不當其位也當弦而鉤而見他氣及他氣主令又見弦鉤即迭移其位也他氣者子氣母氣皆是也初氣見短澀來克二氣又見大長來克如此遞往即失守其位也所謂位者以一步之氣言非司天主寸在泉主尺間氣分主左右六氣一時並見於六部也至真要論曰論言人迎與寸口相應若引繩小大齊等命曰平陰之所在寸口何如岐伯曰視歲南北可知之矣北政之歲少陰在泉則寸口不應厥陰在泉則右不應太陰在泉則左不應南政之歲少陰司天則寸口不應厥陰司天則右不應太陰司天則左不應尺候左右依此推之諸不應者反其診則見矣義詳下文反其診舊解謂覆其手又謂是反其尺寸皆非也覆手是診反關脈此不應非其脈易而出於反關也反其尺寸其不應者自在也殊不知經文反其診則見謂反其診而後見其不應也後人改作反其診則應便難通矣所謂反其診者謂反其平日之常法而從客氣上著想則見諸脈皆隱隱合於客氣而此部獨有不應也經意乃以明不應云者非脈之失其常氣也乃脈之不應客氣也司天是先立其年也子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰上南也下北也司天左右間氣是面北而命其位也位左右也左西右東上見厥陰左少陰右太陽上見少陰左太陰右厥陰上見太陰左少陽右少陰上見少陽左陽明右太陰上見陽明左太陽右少陽上見太陽左厥陰右陽明在泉左右間氣是面南而命其位也左東右西厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰南政甲已二歲論脈則寸在南尺在北三陰司天則兩寸不應太陰司天左寸不應厥陰司天右寸不應少陰司天兩寸不應三陰在泉則兩尺不應太陰在泉右尺不應厥陰在泉左尺不應少陰在泉兩尺不應北政丙戊庚壬乙丁辛癸八歲論脈則寸在北尺在南三陰司天則兩尺不應太陰司天右尺不應厥陰司天左尺不應少陰司天兩尺不應三陰在泉則兩寸不應太陰在泉左寸不應厥陰在泉右寸不應少陰在泉兩寸不應土運之歲面南行令木火金水運面北受氣故分南北政也其左寸右寸左尺右尺之左右字是直以在左者為左在右者為右不似左右間氣天泉兩截各分左右也故此二節左右字與前節間氣左右字微有不同六氣主客圖説六氣有主位有客位主者萬古不易者也客者逐年遞遷者也並南政北政左右尺寸不應圖六微旨論曰顯明之右君火之位也君火之右退行一步火氣治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之此六氣主位之六步也又曰少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之此六氣客位之次序也與前主位太陰少陽互異又曰相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之亢則害承乃制制則生化外列盛衰害則敗亂生化大病此六氣生制之精微不從主位不從容位而專言其化者也五運主客圖説五運五行配宮商角徵羽以陰陽分太少相間而行如甲為陽土初運起土即為太宮次少商次太羽次太角次少徵而終矣己為陰土初運即為少宮次太商次少羽次少角次大徵而終矣余運仿此上五行之客氣分王四時逐年遞遷者也如甲己年土運即土居初而依次推之乙庚年金運即金居初而依次推之其四運之中各貫以初運視其生克察其太少又合主運以參之而萬變莫外矣五運各以陽干為太過陰乾為不及太過者常先天不及者常後天若上見天符陰乾亦為太過若上見天刑陽干亦為不及或曰二者平氣未是木運臨卯丁卯火運臨午戊午土運臨四季甲辰甲戌己丑己未金運臨酉乙酉水運臨子丙子所謂歲會氣之平也土運之歲上見太陰火運之歲上見少陽少陰金運之歲上見陽明木運之歲上見厥陰水運之歲上見太陽是天與會也名曰天符上加天符下臨歲會是為三合名曰太一天符乙酉歲陽明司天之類是也陽干之歲司地同氣曰同天符陰乾之歲司地同氣曰同歲會干支俱與司地同氣陽干亦曰同天符如甲辰年太陰司地是也陰乾亦曰同歲會如癸巳年少陽司地是也其僅地支同天同地者均無所紀土運之歲上見少陽少陰火運之歲上見厥陰凡如此者是天生運也謂之相得土運之歲上見陽明火運之歲上見太陰凡如此者是運生天也以子臨父謂之不當位土運之歲上見厥陰火運之歲上見太陽凡如此者是天不與會也名曰天刑土運之歲上見太陽火運之虛上見陽明凡如此者是運刑天也謂之逆天符為執法歲位為行令太一天符為貴人邪之中人也中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死其氣愈盛其邪愈重位之易也何如曰君位臣則順臣位君則逆逆則其病近其害速順則其病遠其害微所謂二火也舊説君火君也相火臣也按舊説易位六氣客位之遞遷也少陰居少陽相火之位則順少陽居少陰君火之位則逆竊謂此説非也本文位之易也句正承天符歲會説下蓋指非歲會非天符者言也君位臣則順臣位君則逆者司天為君運為臣所不勝為君所勝為臣君位臣即司天勝運也如金居天木居運臣位君即運勝司天也如木居天金居運所謂二火者因五行火居其二其氣常亢而逆犯於天舉此以例余也又按詳所謂二火句是合氣化以言步位也逐歲司氣為君司運為臣臣奉君令即使司運勝氣而其年氣化往往仍從司氣之化而不見司運之化如此則步位之加臨雖易而氣化猶順也惟二火主運之年其氣常亢而勝於司氣是大逆矣故民病較四運之年獨多也按初氣初運皆起大寒此定法也而吳草廬獨言歲氣起於子中盡於子中故子午之歲冬至始燥金三十日然後禪於寒水以至相火日各六十者五而小雪以後其日三十復終於燥金丑未寅申以下皆然此一法也車質中傷寒第一書又言運氣並起冬至徑起冬至與草廬首尾分得三十日不同其主氣次序不以厥陰風木為初氣而以太陽寒水為初氣起冬至即不得不初寒水不以少陽相火為四氣而以太陰濕土為四氣少陽太陰互易其位則主客六氣次序相同矣逐年客氣不重司天而重司泉每一氣中皆加在泉為之主宰此又一法也按運氣者五行化氣之義也所謂先立其年以知其氣本重在氣字上聖人特假此為的使人有所據以為講明之地故曰治病者必明六化分治五味五色所生五臟所宜乃可以言盈虛病生之緒也夫善言人者必有驗於天此古聖所以發運氣之義也善言天者必有驗於人後賢正當一一切合人身方協立言本旨況經明以天泉為人身之上下矣其他不可例推乎運氣説中最難通者一南政北政也一少陰所在其脈不應也前人議論雖多無關實用者言天而不切於人也竊揣南政北政蓋以稟賦之強弱言也南政居北北方風氣剛強以比稟厚者土德最厚故以甲己屬之北政居南南方風氣柔弱以比稟薄者四氣遞嬗無常故以乙丙丁戊庚辛壬癸屬之凡上熱下寒上虛下實皆其例也少陰君火其象為少火生氣以比人身之正陽也不應者正氣有權脈有常象不隨客氣轉移也少陰在天即上盛也在泉即下盛也左右尺寸是陰陽表裡升降之詞陽陰之偏盛者也且經文上言人迎寸口相應命曰平人下即接敘陰之所在寸口何如是陰之所在句顯係指元氣之有偏者不然逐年司天在泉必有一陰也將終古無一人迎寸口相應之平人耶至於運氣二者之異同其在人身當以五運為人身之本氣所謂五形之人也六氣則天地四時之氣感於人身者也內經謂天地相從運居其中而常先也惡所不勝歸所和同隨運歸從而生病也是言天地之氣隨人身五氣之盈虛而生病也故五運只言太過不及以人身之本氣言也六氣分言天泉勝復以時氣之升降言也如經言水運之年太陽司天而為病者即是説水形與體寒之人傷於天之寒氣也黃帝既作甲子而又通其義於醫其言曰天地陰陽者不以數推以象之謂也明數與象其達矣乎至於六氣主客之義正與五運六氣之辨相同詳前運氣主客圖説中蓋作者立言各隨其意之所取而命之故六元正紀大論以運氣立言則六氣不復言主客矣至真要大論以六氣主客立言則不復言五運矣五運之病言內傷也六氣之病言外感也主氣之病言內傷也客氣之病言外感也天泉在內傷則臟氣之亢於上鬱於下也在外感則邪氣之中於上中於下也有勝即有郁在內傷為臟氣之相乘在外感為邪氣之直中有復即有發此久病之轉換也在內傷為虛實之夾雜在外感為邪氣之傳變寒熱虛實真假之難辨莫甚於此矣故運勝氣為逆者是元氣之升降浮沉不與天氣相應也如仲景所謂夏欲得復衣冬欲裸其體之類氣勝運為從者即常人之畏寒畏暑者也其在於病亦不過畏寒畏暑之較甚耳主勝為逆者真臟之獨見如春得秋脈夏得冬脈秋得夏脈冬得長夏脈及春不沉夏不弦秋不鉤冬不毛之類客勝為從者邪氣之外加四時外感之正病也天符歲會天氣人氣之相值也如陰虛而傷於熱陽虛而傷於寒之類易位者不相值也即常人之時氣病也然而聖人不直言其事而必懸象於天者氣化之事通於萬物探原立論天地人物舉賅其中其以干支為言者亦借干支字義中所屬之氣化耳今之用者只當以五運之郁發與太過不及為人身氣化之升降盛衰也六氣之勝復為天地氣化之亢害承製也此以運氣對待言之也若以主客對待言之則又以主勝為人氣內傷之病也客勝為天氣外感之病也故所謂客氣奉天行令主氣不得行令者言人身氣化和平當隨四時之升降浮沉而不得別自獨見不順於時之化也是説也管見所及其有當於經旨否耶高明當有以鑑之按六氣主客之外又有六氣標本之義是亦發明氣化病機脈象之傳變也氣化之三陰三陽與經絡之三陰三陽其義不侔前人乃混合立論殊昧本旨愛録舊説而附辨之素問六微旨大論云少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也本標不同氣應異象內經此旨深遂難測內經文義皆極淺實後人有意求深反致支離無當即王太僕所注亦不過隨文敷衍未見透徹唯張景嶽本張子和之説而發揮之洵足發蒙破扃豁人心目也具圖於後而臚其説焉以下見陳修園書六經之氣以風寒熱濕火燥為本三陰三陽為標本標之中見者為中氣如少陽厥陰為表裡陽明太陰為表裡太陽少陰為表裡表裡相絡則彼此互為中氣也臟腑經絡標本者臟腑居里為本十二經居表為標表裡相絡者居中為中氣所謂絡者表裡互相維絡如足太陽膀胱經絡於腎足少陰腎經亦絡於膀胱也余經同此至真要大論曰少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也何者少陽太陰從本者以少陽本火而標陽太陰本濕而標陰標本同氣故當從本少陽太陰亦有中氣而不言從中者少陽之中厥陰木也木火同氣木從火化矣故不從中也太陰之中陽明金也土金相生燥從濕化矣故不從中也少陰太陽從本從標者少陰本熱而標陰太陽本寒而標陽標本異氣故或從本或從標而治之有先後也少陰太陽亦有中氣以少陰之中太陽水也太陽之中少陰火也同於本則異於標同於標則異於本故皆不從中氣也至若陽明厥陰不從標本從乎中者陽明之中太陰濕土也亦以燥從濕化矣厥陰之中少陽火也亦以木從火化矣故陽明厥陰不從標本而從乎中氣也要之五行之氣以木遇火則從火化以金遇土則從濕化總不離乎水流濕火就燥同氣相求之義耳然六氣從化未必皆為有餘知有餘之為病亦當知其不及之難化也夫六經之氣時有盛衰氣有餘則化生大過氣不及則化生不前從其化者化之常得其常則化生不息逆其化者化之變值其變則強弱為災如木從火化也火盛則木從其化此化之太過也陽衰則木失其化此化之不前也燥從濕化也濕盛則燥從其化此化之太過也土衰則金失其化此化之不前也五行之氣正對俱然此標本生化之理所必然者化而過者宜抑化而不及者不宜培耶上並見陳修園書按經文只論六氣未及六經圖下首署六經之氣便自界限不清有昧正義後圖更以臟腑經絡為標本雖至理之可通究非本義之所有何得與六氣標本並列耶極意求合反致轇轕不清使讀者不能得其真際也謹附辨於下按標本之義本無定指六氣之標本以氣化之正變言也臟腑經絡之標本以人身氣血運行之表裡言也病氣之標本以病之因與證言也又以病之本證與變證言也三者各有專指不可互相牽合即有時偶合亦不可為典要者也如病者傷於天之厥陰風木之氣而患少陽相火之熱病此自六氣傳化之木火也於十二經之少陽厥陰何與耶病者邪由少陽內傳厥陰或由厥陰外及少陽此自十二經之表裡也於六氣之木火何與耶至若病因於寒而見熱證因於熱而見寒證與夫始熱終寒始寒終熱又自病氣之傳變也於六氣六經之陰陽何與耶經所以重言標本者是專指氣化欲人明於六氣傳化之機庶幾臨治可以逆知病氣將來之傳變而預防之即有時病見假象亦可以推明病氣之本然而對治之矣故曰知標與本用之不殆明知逆順正行無問不知是者不足以言診故大要曰粗工嘻嘻以為可知言熱未已寒病復始同氣異形迷診亂經此之謂也觀於此言經之正義非以明六氣傳化各有陰陽欲臨診者知其寒熱真假乎彼斤斤以六氣扭合臟腑經絡者適背經而亂道耳又按經所論標本中氣之三陰三陽者是直指六氣之性情與其傳化也六氣之性情各有陰陽陰陽又各有太少之不同也如風以氣言也是為本風之性有少陽有厥陰少陽厥陰是直指風之性不得復以少陽為火厥陰為風也有性情即有傳化有從少陽而見陽化者有從厥陰而見陰化者其必別之曰標曰中氣者凡氣之行有體有性有傳化體即本也性藏於體所謂中也傳化其標也化陰化陽原無定象大概本氣屬陽者中氣化陽而標化陰也如木火之性屬陽則以陽為中氣而標為陰矣本氣屬陰者中氣化陰而標化陽也如金水之性屬陰則以陰為中氣而標為陽矣近於本者為中氣之化遠於本者為標之化此亦推其理之當然至於氣之傳化不測豈盡拘此然不知其常安知其變經特明其常例欲人有所據以為講明之地耳或曰風以少陽為中氣厥陰為標少陽火也厥陰風也子謂不得復以少陽為火厥陰為風是何義也曰三陰三陽者六氣之性情也本不得以少陽即火厥陰即風況今既以風為本矣何得復以風為標耶故知中標之陰陽皆據其性情以指其傳化之象也經曰風勝則動熱勝則腫寒勝則浮燥勝則乾濕勝則濡泄甚則水閉胕腫此六氣之象也傷於風者見動之象少陽厥陰皆動象也傷乾燥者見干之象大陰陽明皆乾象也象也者以其似也以其類也又按經云三陰三陽者引之可十推之可百引之可千推之可萬又云天地陰陽者不以數推以象之謂也後世拘拘以六氣牽合六經並分析手足之六經見其不合即指為從化經文止論氣化之常尚未及其變也真穿鑿支離無當實用者也蓋嘗綜論經義有方位之三陰三陽有氣化之三陰三陽此其綱領也而大旨不外於氣與象之義南面而立陽明在前其後太陰太陽在後其前少陰少陽在側其內厥陰此方位之説也由是合之人身前為陽明後為太陽兩側為少陽矣凡從方位起義者以之春氣西行始於東為厥陰木夏氣北行始於南為少陽少陰火秋氣東行始於西為陽明金冬氣南行始於北為太陽水此氣化之説也由是合之人身心為太陽肝為少陽肺為少陰腎為太陰矣凡從氣化起義者以之是故推之人身之形層極表為太陽次為陽明次為少陽次為太陰次為少陰最內為厥陰此從方位之三陰三陽變化而出者也是故推之六氣之標本風為少陽厥陰是直指風氣之性屬於陽之少陰之厥也火為太陽少陰是直指火氣之性屬於陽之太陰之少也燥為太陰陽明是直指金氣之性屬於陰之太陽之明也此從氣化之三陰三陽變化而出者也方位即所謂象也氣化即所謂氣也象從氣生者也至真要論曰從本者化生於本從標本者有標本之化從中氣者以中氣為化也即繼之曰脈從而病反者其診何如曰脈至而從按之不鼓諸陽皆然諸陰之反其脈何如曰脈至而從按之鼓甚而盛也是故百病之起有生於本者有生於標者有生於中氣者此即所謂標本不同氣應異象是因氣以成象者也如厥陰之至其脈弦者厥陰之上風氣治之弦為風脈矣然風之中氣少陽而標厥陰若從少陽之中化厥陰之標化脈皆不專弦也何者少陽厥陰乃風之性情所傳化之象也若復以厥陰為風是六氣標本無有不同矣何為氣應異象耶是故以脈言之所謂厥陰之至其脈弦者即風木之脈也少陰之至其脈鉤者即君火之脈也太陰之至其脈沉者即濕土之脈也少陽之至大而浮者即相火之脈也太陽之至大而長者即寒水之脈也陽明之至短而澀者即燥金之脈也所謂本也中標之三陰三陽者是直指其本性與傳化也少陰始陰也太陰盛陰也厥陰陰盡而陽欲動也少陽稚陽也太陽至陽也陽明光之盛氣之餘也故曰少陽脈至乍數乍疏乍短乍長太陽脈至浮大以長陽明脈至浮大而短少陰脈至緊細而微太陰脈至緊大而長厥陰脈至沉短而敦此即三陰三陽太少厥明之脈也非六氣之脈也所謂中標也景嶽亦云前分六氣之性情此言陰陽之盛衰陰陽之太少厥明者即氣化之盛衰而雅其名者也上中下云者非真有此定位也量其傳化之先後而名之也故明於中氣標本而後病證可得其真假矣脈象可得其虛實矣治法可定其逆從矣按五運六氣之外又有九宮出靈樞九宮八風篇講運氣者必深考之太一常以冬至之日居葉蟄之宮四十六日明日居天留四十六日明日居倉門四十六日明日居陰洛四十五日明日居天宮四十六日明日居玄委四十六日明日居倉果四十六日明日居新洛四十五日明日復居葉蟄之宮曰冬至矣此一歲周遊九官也太一日遊以冬至之日居葉蟄之宮數所在日從一處至九日復反於一常如是無已終而復始太一移日天必應之以風雨以其日風雨則吉歲美民安少病矣先之則多雨後之則多旱原作汗誤此逐日周遊之九宮也太一在冬至之日有變占在君太一在春分之日有變占在相太一在中宮之日有變占在吏太一在秋分之日有變占在將太一在夏至之日有變占在百姓所謂有變者太一居五宮之日病風折樹木揚沙石各以其所主占貴賤因視風所來而占之風從其所居之鄉來為實風主生長養萬物從其沖後來為虛鳳傷人者也主殺主害者謹候虛風而避之故聖人避虛邪之道如避矢石然邪弗能害此之謂也正月朔日太一居天留之宮其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日平旦北風行民病多者十有三也十七字疑衍文正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來髮屋揚沙石國有大災也正月朔日風從東南方行春有死亡正月朔日天和溫不風糴賤民不病天寒而風糴貴民多病此所謂候歲之風賤傷人者也二月醜不風民多心腹痛三月戌不溫民多寒熱四月已不暑民多疸病十月申不寒民多暴死諸所謂風者皆髮屋折樹木揚沙石起毫毛發腠理者也民之歲皆同病者此八正之候也候此者常以冬至之日太一立於葉蟄之宮其至也天必應之以風雨者矣風雨從南方來者為虛風賊傷人者也其以夜半至也萬民皆臥而弗犯也故其歲民少病其以晝至者萬民懈惰而皆中於虛風故萬民多病虛邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虛風此兩邪相搏經氣結代者矣故諸逢其風而遇其雨者命曰遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和則民多病而死矣是故太一人徙立於中宮乃朝八風以占吉凶也風從南方來名曰大弱風其傷人也內舍於心外在於脈其氣主為熱太一徙立中宮果在何日經無明文今曆書神煞出遊還位日期與此不同景嶽以為土王用事之期亦於數不合竊思當是每徙一宮必先入中宮而後徙也但未知其數耳風從西南方來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在手太陽脈脈絶則溢脈閉則結不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為身濕風從東南方來名曰弱風其傷人也內舍於胃外在肌肉其氣主體重此八風皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩實一虛病則為淋露寒熱犯其雨濕之地則為痿故聖人避風如避矢石焉其有三虛而偏中於邪風則為擊骨偏枯矣黃帝曰其有卒然暴死暴病者何也少師答曰三虛者其死暴疾也得三實者邪不能傷人也黃帝曰願聞三虛少師曰乘年之衰逢月之空失時之和因為賊風所傷是謂三虛故論不知三虛工反為粗帝曰願聞三實少師曰逢年之盛逢月之滿得時之和雖有賊風邪氣不能危之也命曰三實有一脈生數十病者或痛或癰或熱或寒或癢或痹或不仁其故何也曰此皆邪氣之所生也真氣者所受於天與穀氣並而充身者也正氣者正風也從一方來非實風又非虛風也邪氣者虛風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間其氣外發腠理開毫毛搖氣往來行則為癢留而不去則痹衛氣不行則為不仁虛邪偏容於身半其入深內居營衛營衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛也上八風主病也其義有二自太一常以冬至之日居葉蟄之宮以下五節是論民之歲皆同病者主時行瘟疫之事其風必揚沙石折樹木者也太一徙立於中宮以下十一節是論民之暴病暴死者主中風偏枯之事其所敘八風與前不同不必揚沙石折樹木者也至於尋常避風之法以風來之頭勢為最厲如遇大風猝至急宜入戶避之在途即捫口鼻並用力努掙使陽氣充於皮毛以御之風過之腰力稍緩矣若旋風氣尤惡而力尤徑能刺人筋骨壞人五臟令暴死者也又有隙風是因有物以逼之使其力堅鋭如矢石然故千金方謂有牆十丈不可臥其下使人偏枯其時有不病者以血氣之有虛有不虛也經稱三虛其年衰非謂衰老謂生命與流年之剋制也月空義詳素問八正神明論中失時之和非時之氣所謂得四時之勝也又邪氣臟腑病形篇曰邪氣方乘虛時及新用力若飲食汗出腠理開而中於人也風為百病之長其變化能令人寒能令人熱能令人燥能令人濕入胃則令人狂吐入肺則令人狂咳寒熱灑淅時時汗出挾燥者更痰厚如膿氣味腥濁兩脅脹痛大便祕結此燥氣伏於肺中內經所謂勞風法在肺下也近有誤以肺癰治之致死者風能生蟲蟲生怪證久風不去或蟲生於腸胃或蟲生於血脈而天下無名怪證作矣大抵風性鋭其化最速又風性動其氣易散若傷之淺者頗視寒濕為易開一與痰血相紐刺入經脈之中斯不可拔耳
