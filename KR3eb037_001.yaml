body:
  text: 卷上診法直解求脈大指靈樞邪氣臟腑病形篇以緩急大小滑澀立綱而以微甚緯之實開千古診法之奧後世有以浮沉遲數分綱者則其義淺而不備矣今擬合二者共十字而仍以微甚緯之則但於十字中縱橫離合而於二十八脈不待擬議而形狀瞭然矣然此特其形狀耳不足以盡脈理之妙也滑氏曰凡察脈須識得上下去來至止六字詳見卷二則脈之妙蘊幾於無遺而講脈學者可得所宗主矣蓋求明脈理者須將位數形勢四字講得真切便於百脈無所不賅不必立二十八脈之名可也位者浮沉長短也數者遲數也形者虛實滑澀也勢者即滑氏所謂上下去來至止也四者為經更緯之以微甚兼獨四字百病之虛實寒熱全從此八字上分合剖析每診一人即於各部中按此八字次第求之反復尋之則真假無遁情而氣分血分之病亦到指便見矣此真泄天地之祕者也指到脈上即心先擬其脈浮耶沉耶在寸在尺耶繼調其息遲耶數耶繼察其體長耶短耶虛耶實耶滑耶澀耶審此三者指下必已有定象即就定象上揣其微耶甚耶獨見一脈耶兼見何脈耶至此而象更定矣於是玩其上下起伏之盛衰動止之躁靜而本原無不迸露矣大抵診脈以察來去之勢為最要此陰陽噓吸之機也戴同甫分合偶比類五字説與盧子由診法十則即暢論位數形勢四字義也並見前編卷六拙著診家直訣即發明位數形勢微甚兼獨八法此篇特提大意而已審脈元機有是病即有是脈脈在病後也若夫病證未形血氣先亂則脈在病先診脈而可以預知將來之必患某病也如第三卷所論伏疾脈詳矣然猶一脈主一病病雖未形脈象已定故可據脈以決病也更有脈象未定診今日之脈而可預決其明日之必變某脈因亦今日即可預決其明日之必變某證此中機括微乎其微誠能透此醫也仙矣如今日脈沉而來勢盛去勢衰可知其明日必變浮也浮者病機外出也今日脈浮而來勢衰去勢盛即知其明日必變沉也沉者病機內向也遲而有力知必變數數而少神知必變遲服瀉藥而脈勢不減知來日之必進服補藥而脈力不增知來日之必減昨見火脈今見土脈來日亦必是生脈昨見木脈今見金脈來日亦必是克脈明乎此則脈之與病有順有逆而可預施防維預知趨避矣元機妙用仍不離陰陽五行升降生克之大義也三部九候大義寸關尺候身之上中下者也浮中沉候經絡臟腑之表裡者也此以脈之縱橫之部位主身之縱橫之部位理之至顯而不易者雖病之由上及下者脈未嘗不由浮而沉病之由表而里者脈未嘗不由寸而尺究之各有所主則其中有必然有或然不可過泥亦不容漫無分別也故脈之自尺上湧於寸者多主頭目暈眩胸膈痞滿咳嗽嘔逆之證脈之自沉鼓盛於浮者多主溫病內熱汗出內實便祕之類寸弱尺強下實上虛沉強浮弱表虛里實內經曰上竟上者喉胸中事也下竟下者少腹腰股膝脛足中事也又曰寸口脈浮而盛者病在外沉而堅者病在中睹斯二者其大義可知已氣分血分直言氣無形也血有形也氣動也血靜也動則無形者形矣靜者之形亦因動而見矣然推其本則氣以動昭也血以形顯也故候氣者觀其動候血者觀其形夫脈之行也以息往來其動則氣也其管則血之質也病在氣分候動之勢病在血分候脈之形氣主詬之血主濡之血病當即纍氣故候形者必兼審勢氣病久乃纍血故察勢者不必泥形氣虛血實脈雖弱而按之必有形血衰氣盛脈雖空而其來必有勢血氣盛虛分數各有多寡總於形勢微甚辨之可以按指便見也浮沉遲數皆氣也緩急滑澀皆形也風傷衛者脈浮緩寒傷營者脈浮緊又凡凝痰瘀血其脈雖濡散按之必有徑線或有如珠粒氣之升降不利無論脈形虛實大小其動也疏密不勻強弱不均或寸弱於尺或尺弱於寸或應指少力或中道而還血盛者脈形必厚血虛者脈形必薄牢實與芤革可推也氣盛者來勢必盛氣衰者來勢必衰濡弱與洪滑可例也氣周於外血貫於中故氣寒而血為所束脈即細緊血虛而氣無所歸脈即微散也氣鬱與血結必殊血虛與氣弱不類此分見者也血熱即見氣脈氣寒則見血脈此又互見者也血有形者也故脈以形見血實形實血虛形虛氣有勢者也故脈以勢見氣盛勢盛氣衰勢衰病在氣分未嘗不纍及血分究與正在血分者有別如氣熱者血未嘗不奔逸然清其氣而血即平若正入血分則腫腐矣但清其氣無功也氣寒者血未嘗不凝滯然溫其氣而血即通若正入血分則頑塊矣但溫其氣無功也譬夫物近火非不炙而溫究與為所焚者殊也物入水非不漬而濕究與為所潰者殊也故吾常謂病之在經絡也有氣分有血分其在臟腑也止可以在氣分而不可以在血分前人每言病在某臟某腑血分者仍指其經絡也或指其血為氣纍者也果在血分臟體壞而死矣十二經動脈辨難經開口便説十二經皆有動脈人多滑口讀過究竟十二經之與動脈一耶二耶夫動脈者氣管也經絡者血管也大而在裡徑行臟腑者為經細而在表互相連貫者為絡經絡之中所存者血血之行也充滿推移無分翁闢不能動者也謂之脈而不得謂之動脈動脈者氣管其中無血其動也一翕一闢以息往來諸氣運行以動脈之為領率以呼吸為之鼓激與血管本是二物王勳臣醫林改錯有榮總管衛總管之説即此也但衛氣散行於分肉腠理氣管非衛氣也人身之中本有三氣靈樞邪客曰五穀人於胃也其糟粕津液宗氣分為三隧宗氣者榮衛之所合氣之能動者也故宗氣積於胸中出於喉嚨以貫心肺而行呼吸脈之行也以息往來呼吸不已故動而不止常與營俱行於陰陽營氣者泌其津液注之於脈化而為血以奉生身莫貴於此衛氣者出其悍氣之慓疾而行於四未分肉皮膚之間而不休者也營行脈中衛行脈外動脈者宗氣也血脈者營氣也血管之中榮氣帥血液而環流氣管之中榮氣並宗氣而噓吸宗氣之管與營氣之管兩管並行而不相離亦不相注有此經之血管即有此經之氣管副之而俱行王勳臣醫林改錯家有其書無庸贅述近會稽趙晴初醫話稿中述主制群微一則正與此合録以備覽曰人身濕熱而已熱恆銷濕無以資養則膚焦而身毀矣故血者資養之料也血以行脈脈有總曰絡絡從肝出者二一上一下各漸分小脈至細微凡內而臟腑外而膚肉無不貫串莫定其數脈之狀似機其順者因血勢而利導之斜者留血毋退橫者送血使進也脈之力又能存血不合則壞合於痰乃克順流合於膽乃克凝滯合於體性之氣乃啓諸竅導之無閉塞也從心出者亦有二大絡一上一下細分周身悉與肝絡同所不同者肝引血存血此專導引熱勢及生養之路耳心以呼吸進新氣退舊氣直合周身脈與之應少間不應輒生寒熱諸證醫者必從三部躍動之勢揣知病源蓋以此也按此文全與內經相合但內經十二經脈分屬五臟六腑此則以心肝統之而分達於臟腑耳然靈樞邪客曰其餘脈出入屈折其行之疾徐皆如手少陰心主之脈行也是內經已有此義矣從肝出者血脈從心出者氣脈即動脈也以呼吸進新氣退舊氣即所謂以息往來者也而細分周身悉與肝絡同則吾所謂有此經之血管即有此經之氣管副之而俱行豈臆説而無徵者乎下卷有經脈續辨引證更詳確命門三焦説李瀕湖自言著有命門考命門三焦客難二文今皆不見而其言曰以右腎為命門越人之誤也是未識難經之旨也茲録拙著難經補義脈經札記二篇以備考三焦命門之説聚訟紛紛後人無可復置喙矣今據難經釋之命門為相火之本腎間動氣是也其氣與腎通腎者右腎也少陽厥陰皆相火遊行之部而出入之機則在右腎故右腎非即命門也其氣之發動始於此也命門居兩腎之間不但為真火之本亦即為真水之源故內經不立命門之名而凡言腎之處皆具真陽之義此以見水火同居相合無間不似心肝脾肺四臟各具一氣也水之體陽其在下也動於左火之體陰其在下也動於右右腎非無水而火為盛左腎非無火而水為盛也三焦分診於三部其説似是而實非內經言三焦手少陽之經脈病證多矣細繹其詞蓋有兩義三焦者本是腹內上中下三部之正名也營出中焦衛出下焦上焦如霧中焦如漚下焦如瀆等語皆指腹內之上中下三部非指手少陽經也手少陽之經所以系之三焦者以其脈遍屬三焦耳亦如心脈之屬心脾脈之屬脾皆止一脈非有三脈也心脈屬心脈中之氣即由心來脾脈屬脾脈中之氣即由脾來手少陽之經遍屬三焦而實非有三脈則其脈中之氣不得分受於三焦而必有一為之主知此斯知候於何部矣其寸關尺三部分診者是候腹內上中下三部之三焦是三焦之腑也寸部候胸關尺候腹與手少陽經何與哉命門之原氣周行於三焦而出入於右腎手少陽受氣於命門而借徑於右腎者也命門火也三焦其焰之所及右腎其發焰之處也手少陽受氣於發焰之處而非受氣於其焰則直以手少陽為命門之經可也包絡之經氣通於心故候於左寸三焦之經氣通於腎故候於右尺其原皆出於命門者也故二經為表裡其不同候於一部者何也厥陰之經受命門之氣達於包絡以代君火行事二火同氣相得罔間其氣之動靜聽命於心而不必聽命於命門矣少陽受命門之氣雖遍屬三焦其氣之盛衰不聽命於三焦而仍聽命於命門也且少陽者火之上升者也上升者其根在下厥陰者火之下降者也下降者其根在上厥陰不降則陰火上炎少陽不升則陽火下郁也戴同甫作脈訣刊誤力辨兩尺皆腎命門無經三焦分候於寸關尺也戴為名醫臨證必多其於手少陽經病分候三部庸有當耶是不可解也左屬腎右為子戶名曰三焦原文詳見第一卷分配臟腑篇夫子戶命門也命門之説始於越人豫於難經補義中言之析矣今讀名曰三焦益確然有以自信其前説之不誣也蓋命門之氣內通於右腎外候於右尺其經手少陽此章已於兩手寸部曰合於上焦關部曰合於中焦尺部曰合於下焦矣復於右尺云名曰三焦者見分候於三部者三焦之腑獨候於右尺者三焦之經而三焦之經實稟氣於命門其所以系之三焦者以其脈遍屬三焦而名之耳故手少陽實為命門之經而名曰三焦也右尺實為命門之候而名曰三焦也徐靈胎以衝脈之根為命門之處此即腎間動氣之義也衝脈之根為命門之處非衝脈之根即命門也凡出入所由之謂門男子以藏精女子以系胞男之施由此出女之受由此人其形如脂衆筋所結其位在少腹略近脊高下與兩腎平其氣貫陰陽徹表裡而分為四隧一注於太衝達於五臟六腑五臟六腑各有脈繫於太衝之脈以受命門之氣也靈樞逆順肥瘦曰衝脈者五臟六腑之海也五臟六腑皆稟焉一散於臟腑之外空廓之處充周於上中下之三焦也一由手厥陰之經達於包絡以致於心助君火之運用也一由手少陽之經行於身以溫肌肉通腠理也其積於三焦者亦滲溢於外以行肌肉腠理與手少陽同氣同用盛則俱盛衰則俱衰故即以手少陽為三焦之經也此命門形氣體用之大義也其在脈也必真火為之鼓激而脈始動脈管之形則血之所成也故以脈形之虛實候真陰之虛實以動勢之盛衰候真火之盛衰至當而不易者也奚分左右尺耶三關脈體考反關脈斜飛脈臂外脈叉脈雙弦脈世謂寸口正取無脈覆手取之而得者謂之反關脈近武進費伯雄又有斜飛脈之説張石頑曰脈之反關者皆由脈道阻礙故易位而見有一手反關者有兩手反關者有從關斜走至寸而反關者有反於內側近大陵而上者有六部如絲而陽溪列缺別有一脈大於正位者有諸部細小不振中有一粒如珠者所謂從關斜走至寸而反關者外斜脈也所謂反於內側近大陵而上者內斜脈也所謂陽溪列缺別有一脈大於正位者似反關而非反關也謂之臂外脈蓋諸處本有細絡與手太陰脈通而手太陰之正管實由寸部透於反背出於陽溪趨於合谷正管有阻其氣不能直達則散溢諸絡迂道而達非正管移於諸處也靈樞邪客曰手太陰之脈出於大指之端內屈循白肉際至本節之後太淵留以淡外屈上於本節下內屈與陰諸絡會於魚際數脈並注其氣滑利伏行壅骨之下外屈出於寸口而行上至於肘內廉入於大筋之下內屈上行臑陰入腋下內走肺此順行逆數之屈折也此言手太陰脈自大指外側內屈下魚抵太淵太淵者寸口去本節甚遠但正直本節之後耳復自太淵外屈上於本節下此即所謂外斜脈大指本節下合谷穴處也自合谷內屈會陰諸絡於魚際伏行壅骨之下壅骨大陵穴處也外屈出於寸口者自伏而出斜行與前抵太淵者會此即所謂內斜脈也此脈與外斜之脈出於合谷者雙歧如叉脈經曰從寸口斜入上者名曰解王冰謂不合而歧出如繩之解股是矣外斜脈常與三關平等而內斜脈常細曾見有人時而內斜脈盛時而外斜脈盛其外斜脈盛無苦而內斜脈盛即苦氣逆胸滿蓋嘗思之其外邪脈盛無苦者氣行之正經也內斜脈盛即有所苦者此與手心主相會之絡也絡不當盛必木火逆橫致壅遏肺氣不得暢耳又有三部別有一細脈自尺至寸與正脈並行者此細脈或與正脈平排並行指下如引二線也或行於正脈之上浮之只見細脈沉之始見正脈也或行於正脈之下按之隱隱有一細脈自動於正脈之內也此等最宜留心若正脈中自見細線挺然指下者為寒為痰為瘀為疒徵瘕若別具一脈動而流連則是稟賦然矣世謂雙弦脈指下如引二線者死未足為據蓋雖引二線而指下來往流連者乃是本象其挺然指下無來去者即不二線庸有濟乎張石頑曰反關脈較平人細小者為常較平人反大者絶少不可以為指下變異謂之怪脈也凡遇反關殊異常脈即須細詢其較之平時稍大即為邪盛較之平時愈小即為氣衰仍以所見諸證參之更有正取反取俱無脈細尋卻在手臂鼠肉之上者亦反關之類也但此脈已無常似難憑脈必須察其病證何如元氣何如以斷吉凶此論極為精當諸脈補真補者補元峰輯説中偏而未備者也若專讀此則又疑其偏議其未備矣真者所論皆從歷驗而來無欺誑也夫不肯受古人欺者豈肯捏造以欺人耶數脈下卷痹數篇合看元峰於數脈集前賢諸論已無遺憾矣獨於痹數一義尚未暢發夫痹者血痹也即俗所謂乾血勞也素問平人氣象論曰人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱曰病風脈澀日痹脈經引扁鵲脈法曰一息四至再動為一至謂痹者脫脈氣夫痹何以脈數則以脫脈氣故也脈行十六丈二尺為一周血痹則脈道阻塞氣行不周不及十六丈二尺而又至矣所謂離經也故曰脫脈氣也數而細澀者血液枯乾脈管縮小故也久則大氣即衛氣也全不能外充而內陷遂為大氣入臟腹痛下淫脫泄而死明乎此則知虛勞脈數之故全與熱無涉而所以治之者可得矣浮脈金匱要略曰病人脈浮者在前其病在表浮者在後其病在裡此前後指尺寸言腰痛背強不能行必短氣而極也經凡單言浮者皆有來盛去衰之意若再盛則為洪矣其浮而怠緩應指無力者乃氣血兩虛之候或氣虛之人患風濕亦多見之若再衰則為澀為散矣總之脈既曰浮氣多上升而不下降形體亦多近薄雖按之不似芤脈全空而其主病莫非上實下虛陽強陰弱也短氣而極者氣逼於上而不納也陽噓而陰不能吸非陷下也難經曰前大後小即頭痛目眩前小後大即胸滿短氣此前後指脈來之首尾言此氣鬱於中而不暢也其義稍別而亦自相通皆脈力之能浮者也脈之由沉而浮也陰氣上升從陰交陽也陰之所以能上升有陽氣以鼓動之也脈之由浮而沉也陽氣下降從陽和陰也陽之所以能下降有陰氣以吸引之也浮為陽脈有陰實而拒陽於外者有陰虛而陽越於上者陰實者寒盛於內治宜重用溫散或導其水或攻其食或行其瘀血凝痰力開結塞略加清肅以助浮陽之內合也如白通加膽汁是矣陰虛者陰力薄不能吸陽宜溫潤填補精血略佐辛熱從陰中透出和光接納陽氣歸根也如桂附八味丸是矣嘗診一工作發熱無汗力作不休數日疲憊求治肌膚悗熱喘促低昂脈僅在皮毛之間躍躍不分來去不分至數一息幾至十動略按即無此液竭而陰陽不交也發汗必死矣急用參附湯再加溫元養液大劑投之略加細辛以透陰陽二鼓服藥黎明汗出如雨見者驚惶診其脈則來去分明浮沉有力矣依仲景法以桂枝加附子湯與之一劑而安此法前人醫案中甚多但施之力作之人而病外感則未見耳其實正惟力作不休邪熱內灼故致陰陽兩竭也難經謂中風陽浮而滑陰孺而弱濕溫陽浮而弱陰小而急傷寒陰陽俱盛而緊澀熱病陰陽俱浮浮之而滑沉之散澀溫病行在諸經各隨所在而取之是故浮為在表者謂於浮分察其脈之變象即可決其病之屬於何邪非浮脈即為表病表病僅見浮脈也又或人有謂浮候經沉候臟此説原不必泥然素間示從容曰脈浮大虛者是脾氣之外絶去胃外歸陽明也此則明明謂脈浮而按之無根者是臟陰盡竭元根脫離浮越於外不能內濟而但遊溢於經絡之中而未散也此非脈力之能浮而脈氣之僅在於浮也診得此脈即大劑溫元固下鎮逆猶虞其不返矣而敢用表散乎故外感慮其脈沉沉者邪氣去經而內攻於臟也內傷惡其脈浮浮者真氣去臟而外越於經也沉脈沉者脈位之沉也前人論之悉矣亦有來往之沉則昔人言之而未盡也王冰脈要精微論注曰推筋按之尋之而下脈沉下掣是陰氣有餘故頭項痛也下掣二字微妙可思即經所謂來不盛去反盛者也亦謂之來徐去疾來近去遠陽主噓陰主吸吸力大而陽不能噓之則脈沉此可到指而知也若夫今日脈浮而可測其明日之脈必變為沉此何以知之則於今日之脈其勢下掣知之此病機內向之兆也沉有寒束於外熱鬱於內者沉緊而數盛有力也治宜涼散外寒而內熱不盛者沉緊而不數是寒欲內陷也治宜溫散無寒但氣虛下陷而沉者有三宗氣衰而不能鼓動則多見沉弱衛氣衰而不能薰蒸則多見沉緊榮氣耗竭脈道滯而氣不利辨脈所謂其脈沉者榮氣微也則必兼見遲澀甚或細數矣宗氣者動氣也出於肺參耆主之衛氣者熱氣也出於命門桂附主之榮氣者濕氣也出於脾胃歸術主之昔人謂補火即是補氣只説得衛氣一邊遲脈遲數不並見張石頑曰遲為陽氣失運胸中大氣不能敷布之象故昔人隸之虛寒然多有熱氣內結寒氣外郁而見氣口遲滑作脹者脈經曰遲而滑者脹程郊情曰遲脈有邪聚熱結腹滿胃實阻塞經隧而然者癥瘕痃癖尤多見之竊謂凡此類者其脈必中手有力按之必實凡診脈必兼察體勢若至數雖遲而其勢強體厚者不但可知其熱鬱於內並可測其病之人於血分矣經曰遲為在臟正以其病在血分也在血分則氣行緩故出入遲也所以然者腑分淺臟分深也東垣云諸氣化者皆腑所主諸有形血化者皆臟所主又先哲有言濕溫暑熱初起脈皆沉遲此非虛寒也濕熱鬱蒸之邪口鼻吸入從里而發所以脈象模糊至數不清有類沉遲也濕熱熏蒸脈體散漫應指少力經以緩為熱者此也夫從里而發脈皆沉遲以其深也內經又言躁者在手靜者在足手經近足經遠也靈樞經水篇曰手之陰陽其受氣之道近其氣之來疾即此義也腑數臟遲其義不較然乎向來醫家敘病脈有言尺遲寸數者左遲右數者沉遲浮數者即仲景書亦往往寸口趺陽遲數並見夫遲則皆遲數則皆數不但左右尺寸浮沉不能有二即周身動脈俱不能少有參差故三部九候論曰九候之相應也上下若一不得相失三部九候皆相失者死上下左右之脈相應如參春者病甚上下左右相失不可數者死中部之候雖獨調與衆臟相失者死又祟脈亦有兩手遲數大小如出兩人者非死非祟則決無之諸書遲數兩言者仍指來勢一躁疾一怠緩耳非真至數有多寡不齊也虛實實言脈體之厚也虛言脈體之薄也無論何脈凡輕診如此重按而體勢不減者即謂之實輕診如此略按而體勢頓減者雖不全空亦謂之虛雖經云邪氣盛則實精氣奪則虛究竟仍視所見何脈如和緩而實豈得曰邪弦緊而實乃真邪勝矣大抵實脈多主血實主病多在血分虛脈亦主血虛主病多在氣分其形體堅厚而勢之來去起伏不大者血實氣虛氣為血纍者也痰凝血結是也形薄而又來去不大者氣血兩虛氣不生血者也夫濡弱芤微散澀皆虛也洪動滑弦牢長緩皆實也二者本無專脈只是貫於諸脈之中後人因叔和專立虛實二脈遂欲於諸脈之外別求虛實之專象而終不可得張石頑獨能知之其言曰二十八脈但指下有力有神皆謂之實指下無力無神皆謂之虛庶乎近之脈經曰關上脈澀而堅大而實按之不減有力為中焦實有伏結在脾肺氣塞實熱在胃中按之不減者形之厚也血之實也有力者勢之盛也氣之實也內經曰脈弱以大則欲安靜用力無勞也弱氣虛大血虛安靜無勞以養陰也由此觀之虛實雖各有陰陽而實者多屬陽虛者多屬陰實不至於陽實實猶未甚也虛不至於陰虛虛猶未甚也濡弱形體泡松應指少力浮則為濡沉則為弱其實俱主氣血不足並不能因浮沉分陰陽表裡也二脈和緩略無弦緊之意老人與病後及稟賦素薄者咸宜之不似微脈之極細而薄應指模糊為氣血兩敗之象也又不似細脈之應指弦徑為陰寒凝結之象也但病後經汗吐下乍見此脈雖曰邪退尤屬正虛急宜扶養若漸見勢微形細便非佳兆細脈細者陽氣不充之候也兼弦緊者多見於浮此元陽不足陰寒盛於內外也寒濕在內風冷乘外一身盡疼兼以下利必見此脈兼滑數者多見於沉此熱邪內郁而正氣不能升舉暢達也故傷寒時行病後餘熱未清胸膈不暢即見此脈若病正熾時而見此脈則邪在少陽也三焦氣結而升降出入之機不利也沉細而遲實寒內痼浮細而數虛陽上越因氣寒而乍見脈細者溫之而可復因血痹而漸見脈細者勞損已成也血液不生為虛熱所耗而脈管縮小也朱丹溪謂弦澀二脈最難調治豫於細脈亦云蓋久病脈細未有不兼弦澀者也若更加之以數則氣血皆失其常矣散脈何夢瑤曰大而散漫滲開脈與肉無界限名散脈形本圓斂今散漫不收蓋虛甚而四散者也元廉夫曰何氏又解秋脈其氣來毛而中央堅兩旁虛曰虛者是兩旁散而中央不散也然常見真元不足肝木有餘者其脈中央一線緊細而兩旁散漫證屬不治又不可不知也此説前人未道而實為閲歷之言夫弦而中有徑線者其病危散而中有徑線者其死近秋脈毛而中央堅兩旁虛者乃脈之中央厚而兩旁漸漸薄也散脈乃陰虛而陽無所戀與亡陰之微脈一例脈經曰滑而浮散攤緩風又曰脈沉重而中散者因寒食成瘕脈直前而中散絶者病消渴一云侵淫痛夫攤緩消渴為氣虛血耗見散宜也寒食成瘕及侵淫痛為氣血凝滯宜見弦澀而云中散者何也又曰關上脈襜襜大而尺寸細者其人必心腹冷積癥瘕結聚欲熱飲食襜襜大即散之義也蓋瘕痛日久氣行不暢則舊血日耗新血不生血氣不相榮故也此必久病非初病即有此象也且既雲散矣又云沉重云直前者何也此所謂散者乃氣過指下有混混濁大之形不能條直圓斂脈要精微以軟而散與搏而長對言正此義也私嘗參互考證散脈亦分虛實實者指下雖無定形應指卻還有力似結澀而形體更見寬衍不聚也即脈經諸條是也虛者浮薄模糊軟弱無力即亡陰之微是也又有一種喘脈輕按應指虛大有來無去重按指下即空動於兩旁且漶漫不似芤脈之有邊際也此元根不固氣散之象也陰血虛燥不斂即慎柔所謂虛洪者緊脈左右彈元廉夫曰緊脈諸家皆謂與弦脈相似非也緊者不散之謂也其廣有界限而脈與肉劃然分明者也寒主收引故脈道緊束非弦之端直挺長也仲景謂如轉索左右無常者蓋緊中兼見之脈而非其正形也元氏此説甚瑩究竟收引緊束即是轉索切繩之義至於左右彈而無常者脈體驟束則氣來振撼此惟寒束於外熱氣內盛者有之若內外皆寒則堅細而澀不能左右彈也素問示從容論中前謂切脈浮大而緊後申釋曰脈浮大虛者是脾氣之外絶去胃外歸陽明也二火不能勝三水是以脈亂無常也是明明以脈亂無常釋緊矣且二火不勝三水是明明熱為寒制矣所謂脈亂無常非謂至數疏數不一也即左右彈是也是緊脈固多兼左右彈也而左右彈則不必皆緊脈傷寒例曰脈至如轉索者其日死素問大奇論曰脈至如交漆交漆者左右旁至也微見四十日死金匱要略曰脾死臟浮之大堅按之中如覆杯潔潔狀如搖者死此非緊也乃弦直死陰之氣挺然指下而來去大小不勻應指高下無定位也此死脈之左右彈也素問曰青脈之至也長而左右彈有積氣在心下支胠名曰肝痹脈經曰脈直前左右彈者病在血脈中衃血也脈後而左右彈者病在筋骨中也前後者脈來之首尾也左右彈者應指動搖不定氣結不暢故也又曰脈前部左右彈者陽蹺也中部左右彈者帶脈也後部左右彈者陰蹺也蓋此經有病即見此象此病脈之左右彈也皆非緊也然雖非緊而其脈體卻必不軟弱必有徑直之象惟神理不同此全重在左右彈與寒盛之緊脈主病不侔也寒脈之左右彈者形堅而氣來踴躍也死脈之左右彈者形直而氣來有出無入大小不一也痹脈之左右彈者脈絡滯澀不暢氣來曲屈而達以致左右振撼不定也其氣似滑實非滑也易思蘭曰有患膈滿寸關俱沉大有力尺中三候俱緊按之如搖擺之狀此乃寒濕深入經絡以致氣血凝結脈來牽引振撼是痰血裹於氣外氣滯於痰血之中即痹而左右彈者也微脈微與濡弱不同者濡弱只是形體柔軟而微則極細極薄又無力也與散相近微為氣血兩虛之候而考諸經旨屬血虛者尤甚夫亡陰亡陽皆有微脈靈樞終始曰少氣者脈口人迎俱小而不稱尺寸也陰陽俱不足補陽則陰竭瀉陰則陽脫如是者可將以甘藥不可飲以至劑脈經曰脈小者血氣俱少又曰脈來細而微者血氣俱虛凡浮而極薄卻非極細應指元力而模糊者亡陰之微也推其極則羹上肥也沉而極薄且又極細似見弦徑應指無力不甚模糊者亡陽之微也推其極則蜘蛛絲也極細極薄者血虛也應指無力者氣虛也應指無力為弱脈微乃弱之極故更模糊也脈經曰陽微則發汗陰微則下利謂曾汗曾下也又曰陽微則不能呼陰微則不能吸呼吸不足胸中短氣傷寒論曰脈微而惡寒者此陰陽俱虛不可更發汗更吐更下也此大法也仲景辨脈曰其脈沉者榮氣微也加燒針則血流不行更發熱而躁煩也傷寒論太陽篇曰微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中脈經曰陰數加微必惡寒而煩撓不得眠也此皆久病血虛以致脈體浮薄而軟弱無力者也辨脈曰不戰不汗出而解者其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈又曰脈微而解者必大汗出也謂必曾大汗出此卒病經汗吐下邪去而正亦虛者也又曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血又曰傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿此過用汗吐下津液大傷以致化燥化熱也即加燒針與灸之流弊也故曰諸脈得數動微弱者不可發汗發汗則大便難腹中乾胃燥而煩此皆亡陰之微也少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之傷寒六七已脈微手足厥逆煩躁灸厥陰厥不還者死霍亂惡寒脈微而復利利止亡血也四逆加人參湯主之此皆元陽大虧寒毒太盛而脈微雖當發汗下利後津液必傷而仍以回陽為急者也故曰寸口諸微亡陽此微乃沉細之極亡陽之微也統觀諸義凡脈見此只宜輔正斷無攻邪或養陰或扶陽總宜兼顧陰分不可稍傷津液故四逆本有甘草而又有加人參之例也少陰病脈微細但欲寐此微字只作沉字解厥陰病脈微緩為欲愈此只是微甚之微非微脈也既微矣何所復見其緩耶雖辨脈亦有寸口脈微而緩趺陽脈微而緊之語蓋以微指來去不大應指無力非形體模糊之微也仲景書中此類甚多後人都牽作微脈大謬大抵亡陰之微病勢緩而挽回甚難亡陽之微病勢急而恢復稍易若夫下利脈微弱為欲愈及前所謂汗吐下後脈微而解者不過脈體軟薄應指無力未至模糊欲絶也仍是濡弱之甚者非正微脈也正微脈必如羹上肥蜘蛛絲者也芤革牢脈訣曰兩頭有中間無戴同甫駁之曰如是則寸脈下不至關為陽絶尺脈上不至關為陰絶死脈非芤脈也此乃有意攻擊之詞耳芤脈浮大而軟舉指三關俱有微按之則指下無而但動於每指之兩邊矣此脈經之義也重按之則三指指下全無而但動於食指名指之兩頭矣此脈訣之義也即寸尺本位且無脈矣豈但不至關耶陰絶陽絶者脈自不至關也芤脈中間無者按之使無也豈可溷耶王子享曰如浮而大按之於指面之下中斷語最明顯史載之又謂芤脈如按環子內面兩頭有中間曲而缺非謂絶也此蓋脈形寬大指面不能盡壓脈上故但指內缺而不動指尖之外猶曲而見動也凡脈皆有微有甚稍按之不及中候而斷者芤之甚者也為陰虛失精亡血盜汗按至中候而斷者仲景所謂芤而有胃氣也稟賦弱者此為平脈大病新瘥尤宜之蓋此即濡弱之脈也凡失精亡血脈必芤固矣但芤而內外上下勻淨如一來往不大者可峻用溫潤以補其精血若雖芤而中有一細徑線或寸關尺有一部獨大而鼓指或來去大小不勻此即虛中夾實宜察其在氣在血為寒為熱設法疏之散之攻之驅之攻補兼施須量邪正虛實之淺深以定其緩急輕重也芤脈浮而薄但指下不見弦徑不過血虛而氣稍弱若浮大弦急則為革脈仲景謂為虛寒相搏蓋陰寒之氣僭居陽位不但陰虛而陽更微又以扶陽消陰撥開陰翳為急補血且從輕矣堅實者脈體之實血分之象宜在沉分空虛者脈體之虛氣分之象宜在浮分革脈則實反在上空反在下其空固血虛也其實非血實亦非氣實乃陰寒凝結自成形體阻塞清道非有形亦非無形如滿天陰霾雨澤不降治之仍在氣分設法力透重陰使陰氣下降而內守旋即益陽以收功至於牢脈極沉而遲挺長堅實不見起伏來去此陰冷固結之象肝腎二經氣冷血寒宜以猛熱急驅沉痼然有氣分血分之辨在血分者為癥瘕積聚有形之痞塊飲食寒冷之停滯與夫久受寒濕侵入筋骨者也在氣分者即肝腎冷氣為疝痛少腹引腰控睪也其輕者為胸腹氣結呼吸不暢也徐東皋謂牢脈按之不移即脈訣所謂辨息難也瀕湖斥之亦粗心而未之思矣素問示從容曰浮而弦者腎不足也即革脈亡血失精之義也又曰沉而石者腎氣內著也仲景腎著湯治腰重冷病如帶五千錢者即尺脈牢而長少腹引腰痛之義也寒濕內結不得陽氣以升發之革浮堅牢沉實在外感寒熱極盛之時得之革即格陽牢即關陰蓋尺寸陰陽也浮沉亦陰陽也溢於寸與溢於浮無異也覆於尺與覆於沉無異也其來勢洶湧而形體滑大者或汗或下猶可施治若來勢怠緩無神徒見形體堅搏徑急此死陰之氣非尋常虛寒可比峻用溫補猶恐未能挽回也大抵脈中革與散之浮牢與微之沉皆虛實之極致陰陽之偏絶雖有神丹百難救一長短長有來往之長有形體之長形體之長弦緩相兼之謂也稍徑即為弦矣緩者胃陽暢達也緩而長者中氣充足水火停勻升降流通五臟百脈一無凝滯虧欠故形體圓滿上下動靜首尾如一內經長則氣治即此義也然有肝陽有餘橫滿胸膈兩脅虛脹頭熱目昏神識不清其脈弦而體不甚徑者以其無寒也是其形體全與長無異惟來盛去衰浮多沉少且輕撫於皮毛之間必隱然挺亙不移也此似長非長者一也又有形體通長而其勢怠緩應指無力全無精神此為肝脾並至虛寒之敗象也張景嶽所謂緊而無力者此似長非長者又一也又脈體素弱者肝邪發時如頭痛胸痛疝痛宿食停滯等證往往不甚徑急如所謂長而緩者病在下是也又風濕淫溢多見洪長亦不徑急皆病脈也此又似長非長者其類可推也故形體之長指下易見而主病甚多難云全吉惟來往之長來高去深動勢從容寬綽者最為吉象即有兼脈病亦輕淺總之無病之長其浮中沉一律勻柔余雖形體通長而或浮或沉必有一部按之挺然指下無甚來去起伏之勢也長有來往之長則短亦有來往之短也息之深深達之亹亹此所謂來往之長也其短者陽虛陰盛則噓力微脈沉而掣掣於肌肉之下陰虛陽盛則吸力微脈浮而躍躍於皮膚之上只分動止而無甚來去之勢也亦有止縈縈於中候而上不及浮下不及沉者此先天稟賦不足或氣鬱而中樞升降不暢也至於形體長短已詳見第四卷本條及本卷結脈動脈條內矣茲更以內經脈經證之脈要精微論曰長則氣治短則氣病注曰長者來往長短者來往短平人氣象論曰寸口之脈中手短者曰頭痛中手長者日足脛痛此即所謂推而上之上而不下腰足清也推而下之下而不上頭項痛也脈經亦曰短而急者病在上長而緩者病在下至真要大論曰陽明之至短而澀太陽之至大而長注曰來往不遠是謂短也來往遠是謂長也靈樞終始曰平人者不病也脈口人迎應四時也上下相應而俱往來也六經之脈不結動也少氣者脈口人迎俱小而不稱尺寸也俱往俱來不結不動所謂長則氣治也不稱尺寸謂不稱尺寸之常脈即短則氣病也脈口似指尺以下尺部在內氣初出也人迎似指寸以上寸部在前人與迎也舊説似俱未允已上內經觀此經義長短蓋皆以形體言之也注乃多以來往釋之可見隋唐之間醫之於脈猶以體察來往為務至滑伯仁轉以上下去來至止六字為創穫蓋自宋以後其義微矣脈緊而長過寸口者注病尸注即勞瘵也血脈干竭肝風上鼓脈緊上寸口者中風風頭痛亦如之脈弦上寸口者宿食降者頭痛緊而浮盛宿食化熱也降者浮盛稍減也脈來過寸入魚際者遺尿風邪煽肺氣不下交亦有肝心陽虛脈細長而駛者脈出魚際逆氣喘息婦人血風虛熱搏之脈亦如此頭痛顱脹暈眩嘔吐短而數心痛心煩水邪凌心其勢甚危短疾而滑酒病胃脈受傷毒氣內蘊而血亂也吐血即死浮短者其人肺傷諸氣微少不過一年死法當嗽也頭痛目痛脈反短澀者死此陰脫也凡耳暴聾目暴無所見並同此例腹痛脈反浮大而長者死下血下利日久沉困忌此脈證新痛因風不拘此例四肢厥逆脈反浮大而短者死與汗多重發汗亡陽譫語脈短者死同義尺脈牢而長苦兩脛重少腹引腰痛婦人腹滿陰中急此寒疝也寒濕深痼於肝腎之血脈更有少腹兩旁大筋粗硬牽痛下引睪丸及兩股者脈沉重而直前絶者病血在腸間沉而不揚弦細上駛是血瘀積與熱搏也脈沉重前不至寸口徘徊絶者病在肌肉遁尸短澀伏寒在血脈纍纍中止不至寸口軟者結熱伏留在小腸膜中脈纍纍如貫珠不前至有風寒伏留在大腸已上脈經統觀經義皆形體之長短也長即弦緊之類短即結動滑澀之類揍其義約有數端風邪鼓於上長必見於寸口兼寒則緊兼熱則洪濕邪注於下長必見於尺中兼寒則牢兼熱則緩陽損於上頭小本大胸滿短氣陰損於下頭大本小頭痛目眩風熱錮於表發為瘡疹脈必三部長而兼洪濕熱蘊於裡發為腫痿脈必三部長而兼緩痰飲瘀血格於中焦發為喘逆為結痛脈必三部纍纍厥厥斷續不勻及其敗也或溢或覆或如引索或如循長竿或如循薏苡或如麻子動搖是皆長短之主病且其病不皆輕淺也蓋長短之形體有二有三部內見者有三部外見者三部外見者即上魚為溢入尺為覆是過於本位為長不及本位為短之説也三部內見者即俱往俱來不結不動三部齊起齊落首尾如一是短則氣病長則氣治之説也後人每以過於本位不及本位為詞而其義則又取氣治氣病之義夫過於本位豈氣治耶無怪窒而難通而長短皆不診關之説鑿而愈難也至於來往之長短經無明文只見王注竊嘗考之經凡言大小者多指來去之盛衰而言長短者皆指形體之伸縮也故王氏之説於理雖精而以之注經則猶未合弦脈弦為外陰內陽之象東垣曰脈弦皆陽氣衰弱伏匿於陰中舊説外陽內陰者非也蓋弦脈總見於浮其沉弦者牢也弦既屬浮總是陰陽不和肝邪上逆在風寒外侵諸證病之淺者元陽未虧雖見寒緊之象不宜過用溫藥轉動內熱也其久病亡陽下利而見弦者為火土兩敗非重用桂附不可挽回又有弦脈寬大細按中間更有一條徑線隱隱挺於指下此或脾腎二臟有一偏竭或臟腑中有死血凝痰陽氣不到之處又有細緊有力見於左手寸關之分此為痰藏包絡防作顛厥見於右手寸關之分此為痰結胃脘防作噎隔且並防胸膈急痛如刀切及洞泄注下熱則急痛寒則注下也見於兩尺者肝氣入腎為疝痛腰急不能俯仰也大便久祕有左關與右尺洪弦滑實者肺燥肝熱大腸郁濁也弦者形之徑也為有餘當指下有力若無力者凶矣有風寒外感之弦有痰血聚積之弦有情思鬱結之弦有肝陽亢逆之弦有群陰瀰漫之弦若此者或在氣或在血或在經或在臟或寒或熱總是陰陽不和互相格拒乃致於此故弦有實而無虛也獨有燥弦非寒非熱津液耗竭脾肺不濡不能淫精於脈飲食減少大便祕結肌肉消瘦皮膚白屑胸中窒窄少腹拘急偶爾陽越面赤亦非肝邪眩暈脈來浮候弦徑按之仍見濡弱此津液不足氣不化精之故如物乾則堅濕則柔是也芤脈按之空此按之不空過在肺脾氣分未動肝腎血分氣亢而津液被灼故外感風溫者多見此象即如仲景謂寒傷營者脈浮緊浮緊即弦也風傷衛者脈浮緩浮緩即燥弦之類也所謂緩者緩於緊非更緩於常脈也內經曰風客淫氣精乃亡邪傷肝也王冰注謂風勝則熱起熱起則水乾水乾則腎氣不榮矣李東垣曰六脈中之下得弦細而澀按之無力此風熱大損寒水燥金之復也即此義也夫燥弦者實非弦也胃脈本長胃燥故長者徑而似弦也瘦人無病不足為苦但須體認勿致有病臨診與弦同治燥弦宜生津調氣不可宣陽散陰也緩脈與長脈參看緩為胃氣脈無論矣有虛寒之敗脈近於緩風熱時病之危脈近於緩不可以不辨虛寒之敗脈即張景嶽所謂緊而無力者也形體弦長來去怠緩頗似從容不迫者但無起伏動蕩之致耳此肝脾並至色見目青顴黃去死近矣風熱時病而脈緩者即經所謂滑而緩曰熱中是也風溫濕溫愈熱愈緩以風熱為陽邪也愈緩則津液愈耗若不知清熱養液或誤認濕重而燥之利之旋變澀疾虛散不可為矣三指禪謂噎膈反胃脈多見緩可見緩為濕熱化燥之象昔人謂六月見緩脈為土剋水者死蓋其形寬長怠緩無流暢之象此津液內虛浮陽外鼓也頗有氣出不返之意陰陽二氣相失而不復相維故也緩為陽脈無陰以和之榮衛離散氣與血分故脈中不得遽見血家敗象嘗診冬病腰痛面色黑黃肢體倦怠脈兩尺長緩來去分明有力獨肺脈短弱脾脈亦不及其人立春病春分死此上衰而陽氣熄於上金衰而陰精涸於下也水不生木則木虛木者虛則喜賁故至春即克脾肺金又不足以制之故病胸中結硬下利不止不能食也木無水涵則枯而生火故臨死脈如湧泉也是獨心之真臟矣或曰兩尺見長木侮水也不知木乘水以子犯母水氣未竭脈氣按之必緊緊者水氣也所危者正以其緩而不緊耳洪脈浮洪表熱多由陰虛沉洪裡熱多為寒束前人言之矣更有中洪之脈浮沉俱見細弱獨中候形體寬大應指有力此主脾陽不足中氣不暢胸滿腹脹之證大致病根總由於濕兼數則熱兼遲則寒濕寒而脈洪者正以氣鬱中焦陰霾充塞陽氣不得宣行通暢清濁升降不分也嘗病濕熱過服寒涼脈見中洪因從燥土溫火佐以宣散而愈東垣升陽除濕湯下怠惰嗜臥逆氣上衝其脈緩而弦急按之洪大皆中之下得之此心火乘脾脾土受邪也又補氣升陽和中湯治李正臣夫人合目則遍身麻木其脈六部皆中得弦洪緩相合按之無力此陽氣不行濕氣伏匿而作也所謂心火乘脾者即陽氣不行鬱於中焦也大抵洪脈本屬大熱其熱為寒濕所郁者中間必隱帶一分弦意也若夫陰虛陽陷內熱蘊蒸脈見濁洪則不必兼弦矣如楊栗山曰溫病邪從內發其脈不浮不沉中得洪長滑數重濁不清此津液枯乾邪熱蘊結不散脈見中洪者也高鼓峰曰有一種脈重按有力卻不弦緊從肌肉滲開漫無界限此近於浮洪豁大是陰亡也此即所謂喘脈滿指虛動不見正形不見邊際若按之有力屬實是肝腎之血熱按之空豁無力屬虛是肝腎之陰燥也實宜苦寒虛宜甘潤此陰虛之中洪脈也又嘗見陰虛內燥陽陷入陰血熱沸騰證見小便熱赤大便祕結五心悗熱氣短食少脈來沉弦滑數應指有力實大異常喻嘉言論熱人血室曰血熱交併則脈見洪盛是也此陰虛之沉洪脈也投清熱養液佐以宣疏略兼健脾提陽氣出陰歸陽脈乃漸見和平故葉天士曰養陰不在補血而在生津王孟英謂為增水行舟之法也凡洪大之脈不宜空也以其正氣當盛也不宜過實以其邪氣向外也空則根不堅實則邪內痼促脈脈訣曰指下尋之極數並居寸口曰促楊仁齋曰貫珠而上出於魚際王子享曰自尺上於寸口促急有來無去素問平人氣象論曰寸口脈中手促上擊者肩背痛難經上魚為溢即促之甚者不必數中一止也此日本元氏輯要説也曰並居曰上擊曰有來無去皆氣爭於上而不下之義內經所謂鼓且搏者類也於促字義甚切但與數中一止者主病恐不相侔數中一止者陽氣上盛而下虛不能接續也傷寒誤下後見之津液受傷虛熱鼓動來去躁疾時見一止非有湧沸上爭源源不竭之勢也惟陰虛也故陽盛也張石頑謂為陽邪將欲內陷亦以其陰氣不續也氣並於上而不下者其主病輕則胸膈逆滿頭眩氣喘重則癲厥或狂矣生氣通天論陰不勝其陽脈流薄疾並乃狂薄者迫也疾者躁也並者陰陽並行一道也形大勢盛至於其極血隨氣升奔逸於經隧之中而百脈皆張矣此乃洪之甚者也傷寒太陽誤下兩條一日脈促胸滿者桂枝去芍藥主之一日利遂不止脈促者表未解也喘而汗出者葛根芩連湯主之又一條曰脈促不結胸者為欲解也皆上擊之義非止歇也滑澀動結促辨滑者脈之浮沉起伏婉轉流利也形體條暢浮沉皆得若來如電掣略按即空此滑不直手元氣將脫也澀者脈之將起未起之際有艱滯難進之意及其既至亦頗有如擲如躍之時但中間常於將來之頃夾雜一二至阻滯不暢耳動脈全似滑脈滑脈形體和軟而有起伏動則形體堅搏指下如豆躁疾鶻突幾於有來無去起伏不明也結脈即動脈之怠緩者促脈即滑脈之兼洪者此五脈惟促脈主病氣分居多餘四脈則氣血參半而有寒熱虛實之殊滑主濕熱為痰飲為宿食化熱為胃滿不食為多夢不眠為裡急後重其主病多在腸胃與肝包絡之有餘新病最為易治若入血分漸深則漸見弦徑矣澀脈主血虛有熱液燥不濡之候其脈多空而薄結脈即澀脈之實者凡凝痰瘀血寒食停滯以及久坐久思氣鬱血滯之屬於寒實者悉主之動主陰陽不和寒熱相爭氣為血滯而不能暢之候卒病久病皆有之卒病者力徑久病者力漸衰而近結矣結脈辨脈曰脈浮而數能食不大便者此為實名曰陽結脈沉而遲不能食身體重大便反硬名曰陰結此言證也非言脈也脈藹藹如車蓋名曰陽結纍纍如循長竿名曰陰結又脈來緩時一止復來名曰結脈來數時一止復來名曰促陽盛則促陰盛則結大抵皆主陰陽偏盛之候自叔和專取緩中一止之義而結遂專屬於陰矣凡憂鬱痰水積聚寒濕之脈莫不見結其形堅急不舒而往來難也緊而難謂之結傷寒厥陰篇瓜蒂散證手足厥冷脈乍緊者邪結在胸中可吐篇載此文作脈乍結是二脈相類之徵也緊為氣中血寒結為血中氣滯滯必兼寒故結必見緊也散而難謂之澀結主實澀主虛昔人有謂澀主凝痰瘀血等證者皆結脈也內經亦以澀主多血少氣微有寒血寒而壅氣不足以行之此正結脈之所出也內經曰六經之脈不結動也是結與動類也中藏經論血痹曰脈結而不流利或如斷絶者是也是結為氣鬱於血也史載之曰脈氣結而不勻逐位間絶又曰結脈疾數而懸絶纍纍如珠而又不流利與滑不同但逐部位流通指下如滴水起頭是也此全是仲景所説動脈形狀而此云結者二脈形本相同但動脈勢急結脈勢緩耳脈經曰脈問來而急者病正在心癥氣也夫略間而來急者結脈也西醫謂脈之動者心動也心氣不暢則脈息不調故脈經曰脈短而澀者心痛短而澀即結脈也諸痛瘡瘍皆屬於心故又曰外結者癰腫內結者疝瘕也總是血中氣滯之候動脈纍纍如珠拙著辨脈章句篇文已録於前編矣其有未盡余意補著於此前以陰陽相搏指浮沉陰動陽動指尺寸是矣繼而歷驗所診又不必盡然蓋陰陽相搏只是推明動脈之根由於陰陽氣血不和而相爭也所以不和而爭者陰陽不得其位也陽抑於內陰痼於外故人病每多先形冷惡寒而後發熱而後汗出因三焦之氣不能達於周身故形冷惡寒也陰動者沉分動也陽抑在內積不能平而有發動欲透重陰之意也陽氣發動故發熱也陽動者浮分動也是陽氣漸達於外而陰將退讓矣故汗出汗者陰氣之所泄也如是則陽伸於外陰復於內故人病每汗出而解也動脈有見於一部者有見於三部者指下各有如豆其形與弦相反也而主病竟有同源者嘗診一瘧疾正欲作寒矣其脈左沉右浮按之如珠滾滾自尺上寸左為尤甚此肝脾氣鬱不和也夫瘧脈必弦者以寒濕搏於表腠理不通其氣束脈故弦寒濕格於中三焦不通其氣激脈故動也三焦者少陽也正瘧邪之所據形冷惡寒發熱汗出正瘧疾之形證可知瘧脈亦不必弦矣陽動汗出陰動發熱蓋相搏而動動必有勝勝必有復故或寒已而熱或熱已而寒勝而能復正其勢均力敵然也若本體有一虛則其繼必不能復而其始亦不至於動矣故前人謂陰陽相搏虛者則動其説非也相搏即動矣何待虛者此虛字只可作輸字看本體不虛猝致相爭乍勝乍負相搏而動此時其機甚危陰動勝陽之時誤服寒涼遏其陽氣則氣息奄奄口不能言急則一日遠則五六日而死陽動勝陰之時誤服燥熱傷其陰液則汗不得出煩躁若狂或汗出不止而亡陽暴脫矣此和解之法所以貴也和解者清疏也此時最易誤認為熱而用涼下以其脈滑數而實也夫動者陰陽相敵而不相和也和之而已不可有所偏助也傷寒論曰諸脈得數動微弱者不可發汗何夢瑤曰數而跳突名曰動大驚多見此脈此誤會動為驚之説也須知動為驚為痛均要從陰陽相搏上理會夫大驚卒恐脈多鶩暴此喘而上爭來盛去衰大類促脈非動脈也氣虛神弱而常病恐懼者平脈所謂如循絲纍纍然者是也亦非動脈也動者陰陽不和而力足以相敵因而相戰致脈見搏擊漉漉如珠不能條暢成長直之形也在新病為寒濕格於三焦故寒熱相爭在痼疾為痰涎格於胃與包絡故氣血相激也其為驚也即如於睡夢中忽而驚掣之類也其主痛亦必如靈樞所謂厥痛痹痛非尋常金瘡跌僕癰腫者也生氣通天論曰俞氣化薄傳為善畏及為驚駭陰陽別論曰二陽一陰發病主驚駭大奇論曰脈至如數使人暴驚此皆動為驚之義乃陰陽不和無所見而身自驚惕者也又所謂如驚癇狀時瘛瘲是矣大奇論曰肝脈鶩暴有所驚駭此有所見而驚即何氏説也驚定即脈靜非病也又曰腎肝並小弦為欲驚此即平脈所云乃氣怯神虛所致靈樞邪氣臟腑病形素問藏氣法時言肝膽病皆曰虛則善恐如人將捕之是也至於腎為恐腎水凌心則人善恐此亦動脈所主也陰陽無形之氣相搏則脈動氣與痰食諸有形之邪相搏則脈亦動私嘗新定動脈主證曰為寒熱為瘛瘲為怔仲為痹為胃脘痛證不止此詳見前編脈經曰寸口脈偏動者從寸口至關從關至尺三部之位處處動搖各異不同此病以仲夏得之桃花落而死此動脈之正象心火受制於寒水者也脈訣謂不往不來不離其處即無頭尾也三關指下礙沉沉即厥厥也可謂獨得真相戴氏斥之過矣脈經又曰脈纍纍如貫珠不前至有風寒在大腸伏留不去脈纍纍中止不至寸口軟者結熱在小腸膜中伏留不去觀此則寒熱內結皆見此脈總是氣鬱血分不得宣暢之象據大腸小腸云云則五淋白濁痢疾後重亦當有見此脈者至於心平脈亦曰纍纍如貫珠腎平脈亦曰喘喘纍纍只是滑利之義若堅急搏指不移如循薏苡子則真臟死脈矣故又曰三部脈纍纍如貫珠長病得之死又有脈來圓散如粒轉轉自尺上寸卻弱不任按此真元虛寒內有痰飲中焦氣不暢達以致斷續有痕似動似滑似結似澀昔嘗病後見此一息三至三昧所謂平動不鼓牒牒而去也重劑溫元久而乃復澀脈澀有血燥亦有氣虛故有虛澀有實澀有尺寸之澀有浮沉之澀自尺至寸前進屢躓此多由血液耗竭經隧不利也自沉至浮外鼓遲難此多由元陽衰弱動力不暢也又無論尺寸浮沉來勢艱滯但見應指有力即由於實應指無力即由於虛且脈之澀也乃於他脈中雜以數至之來難也非每至必澀也須察其不澀之至滑耶痰也數耶熱也遲耶寒也弦耶郁也結耶血之凝也微弱耶氣之衰也細小躁疾耶火燥而液耗也再察其正澀之至應指之有力無力而虛實無不了然矣若每至必澀是脈亂而死矣大抵澀脈屬寒者多倘兼見滑數即防胃癰腸癰肺癰及惡瘡腫也其元陽衰憊應指過於無力者與代相近但代脈平平而來忽然一止無中途來往之艱滯一專氣衰一兼經阻也凡見於汗吐下後及素善盜汗者血虛之澀也若脈經所謂澀而緊痹痛遲澀中寒有癥瘕與宿食脈緊而澀者血壅之澀也緊而澀者全似結脈但結從來去之怠緩上見每至皆怠緩也澀從來去之艱澀上見不必每至皆艱澀也結脈病在氣分宜溫元開鬱澀脈病在血分宜養液行瘀前謂結主實澀主虛亦不必過泥滑脈經曰脈弱以滑是有胃氣命曰易治既弱矣豈得為胃氣病脈兼此是有胃氣也又曰緩而滑曰熱中緩滑皆胃氣脈也而曰熱中此必動勢盛大而不和平也夫滑者陽氣之盛也其為病本多主熱而有餘故脈經曰脈來疾者風也滑者病食滑躁者有熱澀者病寒濕難經謂滑者傷熱澀者中霧露霧露即寒濕也滑者鬼疰沉亦為注緊而長過寸口者亦為注蓋沉緊長滑四脈並見也滑疾者胃熱遲而滑者脹闢大而滑短氣短疾而滑酒病浮而細滑傷飲浮滑而疾食不消脾不磨關上緊而滑者蛔動尺中沉而滑者寸白蟲觀此諸説概由濕熱其言寒者即內經陰氣有餘之義非真寒也況病有表寒裡熱有裡寒表熱有表裡俱熱故滑而多有兼脈也滑自主熱其兼脈自主寒非滑能正主寒也又謂滑脈始為熱終為虛所謂熱者血熱也所謂虛者血虛也津液為熱所鼓蕩如長江大河滾滾不盡熱滑大義已詳上文矣虛滑即滑不直手是津液竭盡脈絡空虛氣無所繫也素問大奇論曰脈至如丸滑不直手按之不可得是大腸氣豫不足也棗葉生而死傷寒不可下篇曰脈浮而大浮為氣實大為血虛血虛無陰孤陽獨下陰部者小便利而汗大出津液四射榮竭血盡干煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虛客陽去有期必下如汙泥而死脈經曰脈浮而滑其人外熱風走刺有飲難治此皆虛滑之義正氣無所歸宿澀極之幻相也夫毒藥攻胃者是誤虛為實以滑為痰而攻之者也有飲難治者正氣為痰飲格拒不得歸根邪風遊溢經絡一身流走刺痛正氣將散者也脈經又謂尺脈偏滑疾面赤如醉外熱刺痛正此義也辨脈曰浮滑之脈數疾發熱汗出者不治又溫病之壞證其掣如電按之即散者也滑澀似動結滑為氣血有餘澀為氣血不足此滑澀正義也濕熱化痰氣鬱血壅此滑而兼於動者也痰凝氣聚實寒相搏此澀而兼於結者也故於滑脈中分邪正於澀脈中分虛實脈經曰澀而緊痹痛遲澀中寒有癥瘕浮緊且滑直者外熱內冷不得大小便沉而滑為下重亦為背膂痛氣鬱血滯之義顯然故吾常謂前人之言滑脈多夾雜動脈在中平脈曰滑者緊之浮名脈訣曰滑者三關如珠動是也言澀脈多夾雜結脈在中杜光庭曰澀謂秋中多結脈是也更有動久氣衰而近結澀極氣脫而似滑具慧眼者自能剖析毫芒肆應不惑滑澀並見二脈主病相反相同素間脈要精微曰澀者陽氣有餘也滑者陰氣有餘也靈樞邪氣臟腑病形曰滑者陽氣盛微有熱澀者多血少氣微有寒脈經又以滑為多血少氣澀為少血多氣言若兩歧理實一貫蓋氣之力大於血血為其所鼓動而無所留滯故滑為氣盛也血滯而氣不足以行之則血壅而見多矣故澀為多血少氣猶曰形瘦脈大胸中多氣者死豈真有多氣而死正以氣壅而不通耳此靈樞之義也血主濡之氣主詬之氣為陽熱能耗血者也滑則津液充溢熱勢不能耗之故陰有餘也澀則陰虛陽往衛降榮竭血液為壯火所灼而不能充滿流動矣故陽有餘也陰有餘故多血少氣陽有餘故少血多氣也此素問與脈經之義也二脈相反不能並見平人氣象論尺澀脈滑謂之多汗此指尺之皮膚非並見於脈也然中藏經虛實論曰診其左右尺中脈滑而澀者下虛也巢氏腸癰候曰脈滑澀者小腸癰出血者也至於難經所謂熱病之脈陰陽俱浮浮之而滑沉之散澀者其為並見更屬無疑夫脈固有浮之拍拍擊手似洪滑沉之來難不調似澀此主氣熱血虛也華氏所論其殆此耶亦有浮之來難不調沉之漉漉似滑疾此氣鬱於血血分熱沸也巢氏所論其殆此耶凡癰疽既已出血浮滑沉澀者逆沉滑浮澀者順但養液清熱和榮衛自復矣且澀脈乃於他脈中雜以數至之來難也若每至必澀則脈亂死矣故澀脈必有兼脈其氣弱血燥而虛澀者兼見之脈多在軟弱一邊其氣鬱血滯而實澀者兼見之脈多在洪滑一邊方其澀時脈氣未能暢達一達則湧沸而上也此二脈所以多兼見也又二脈主病略同而有寒熱虛實之相反如宿食凝痰瘀血等證寒則澀熱則滑久則澀新則滑虛則澀實則滑故趙晴初曰滑脈多主痰以其津液壅盛也然有頑痰阻塞氣機脈道不利反見脈澀者開通痰氣脈澀轉滑見之屢矣即仲景論宿食脈亦或言滑數或言緊澀寒滯冷積則澀蘊熱化痰則滑也故脈經曰脈緊而滑者吐逆小弱而澀者胃反胃反必吐逆也而滑澀異脈者實熱與虛寒異本也尺脈滑而疾為血虛尺脈澀下血下利多汗下血必虛血也而滑澀異脈者澀為本脈其滑而疾者陰虛陽往衛降榮竭所謂陰虛生內熱者也中藏經以滑為虛此其義也代脈經言色黃者其脈代又言但代無胃氣曰死是代為脾之本脈只是軟弱之義耳夫脾脈何以軟弱也代脈又何以止歇也人以為兩脈吾以為仍是一義也蓋人身之氣左升而右降臟腑之氣肝腎升而心肺降是皆脾氣居中為之轉旋上下更代之樞紐也升之氣於是終降之氣於是始運動之機勢至此而有脫卸即至此而有停頓故脈遲緩而軟弱也脾氣一絶升降不續則止歇見矣故止代者脾之真臟也代脈大義已具前説矣內經脈要精微論曰數動一代者病在陽之脈也泄及便膿血脈經扁鵲脈法曰細而沉不瘛瘲即泄泄即腸澼澼即脈代乍至乍不至是皆出於久病榮血傷敗之象也三部九候論曰其脈代而鉤者病在絡脈禁服篇曰代則乍痛乍止脈經手檢圖曰脈來暫小暫大者陽絡也動苦肉痹應時自發身洗洗也脈來暫大暫小者陰絡也動苦皮膚痛下部不仁汗出而寒也其即內經病在絡脈之義耶是皆氣血凝滯之象也蓋代只是止須視其不止之至敗與未敗以定吉凶故脈經曰熱病七八日脈微細小便不利加暴口燥舌焦乾黑脈代者死又病瘡寒熱瘛瘲其脈代絶者死又老人脈陰弱陽強脈至而代奇月死又瘧疾代散則死又右手尺中神門以後脈陰虛者腎虛也脈代絶時不至腎虛者命門火敗也此皆死脈必別見敗證敗象未嘗專以代主死也周慎齋脈法曰雜病傷寒老人脈見歇止者俱將愈之兆惟吐而見歇止脈者死陳友鬆解之曰吐見止脈是元氣竭於下不能上供其泛逆也趙晴初補之曰將愈脈見歇止是和平脈中見歇止也此又未嘗專以代主死也果見敗象不但忽止忽來為氣亂無常即不見止而平脈中忽見一二至微弱無力亦代脈之必死者也脈經曰關上脈滑而小大不勻是為病方欲進不出一二日復欲發動其人欲多飲飲即注利利止者生不止者死又曰關上脈時來時去乍大乍小乍疏乍數者胃中寒熱羸劣不欲飲食如瘧狀合觀二節是陰陽不和寒熱夾雜之象利止者陽盛也不止者陰勝也又曰三部脈或至或不至冷氣在胃中故令脈不通也即此義也昔人謂妊娠脈多代歷診未見止代者但見滑疾流利中偶有一二至應指少力耳此象雖為血盛氣壅究宜細問有無氣血痹痛半産夙疾或新下利亡血及腰腹痠疼等事恐或胞傷欲墮也促結澀代不同四脈皆有止而不同促結之止能自還者本臟之氣未傷但為邪氣阻礙故其脈稍停而仍自至於寸口略遠於前至而並於後至也亦有並於前至遠於後至者代之止不能自還則本臟之氣已絶不能復至於寸口故其脈停之有頃直少一至待他臟之氣至而後復動也澀則或於遲脈中數至來略數或於數脈中數至來略遲所謂參伍不調也數至不調謂之澀一至不調謂之促結一至獨絶謂之代不必拘於止有定數無定數也如五動一止者雖或間以十動十五動而止亦皆謂之五動而止以其皆在以五紀數之處也數脈間以來遲為澀是也遲脈間以來數亦為澀者以其氣不調也伏脈脫脈最難診者將伏將脫之際故篇末詳之伏者兩手乍不見脈也氣閉也非氣脫也然全身脈伏則亦氣悶而絶矣故寸關之脈既伏則尺中之脈不可伏也頭面之脈既伏則心腹之脈不可伏也兩手之脈既伏則趺陽太溪之脈不可伏也既伏者無可診也診其不伏之處湧盛上爭有踴躍之勢者伏脈也旋引旋收轍亂旗靡在反掣之意者脫脈也世謂伏脈推筋著骨而始見是猶有可見只可謂為沉之甚者難經曰伏者脈行筋下此乃沉之甚者故主積聚久病不主尸厥霍亂急病也細之甚者微之甚者而不得謂之伏伏則兩手直不見脈也主暴病實病凡卒尸急痛者有之若久病虛病不宜見此故傷寒十三日以上不間脈尺寸陷者危陷者突然脈沉小無力此氣欲脫也脈經曰伏者霍亂此氣閉也難經曰遂入尺為覆為內關外格此陽乘之脈也覆即伏也諸家謂陰內閉而不出陽外入以格拒之非也陽內閉而不出陰外入以格拒之也故曰陽乘者陽氣陷入陰位也故治伏者只宜宣散必無熱補以其外陰內陽陽伏於內實有物焉而非虛也故曰伏也若內陰外陽而至於無脈是陰陽離絶即脫矣脈經曰心衰則伏肝微則沉此伏字只是極沉而細者然西醫謂脈之動者以心動也故脈不動者心無氣也故尸厥不知人氣復反則生不反則死又內經曰肝脈騖暴有所驚駭脈不至若瘖不治自己此亦心氣乍失其所也故吾常謂伏者有邪與正相迫有正與正相迫正與正相迫者陰陽相爭而不相下並行一道氣機壅窒不能旋轉如兩人對行狹巷抵觸而各不得進也此升降乍亂大怒甚恐者有之若二氣有一偏盛偏衰則讓開氣道而不至於伏矣邪與正相迫者如大寒甚暑中之者猝不知人是邪氣猛來格拒於外使正氣不得通行也此人元氣必實若不實者必為邪氣侵入正氣滅矣故伏者陰陽邪正力能相敵而然也故伏脈無虛病治伏脈無補法即如傷寒有通脈四逆證此元陽大傷陰邪上掩人心也伏而幾於脫矣藥用辛熱補中仍寓宣散此與房室感寒脈伏者治法相同皆正氣內怯而脈伏伏脈之虛證也且不能純用溫固況其他乎若不任宣散者即真脫矣故少陰病下利不止厥逆無脈用白通湯加豬膽汁服之脈微續者生暴出者死為其近於脫也若果伏脈何不可暴出乎前謂診其身中有脈之處湧盛上爭者伏也旋引旋收者脫也此係指病氣已定寸口脈氣已伏之後言之若當病之乍起寸口脈氣未伏將伏之際診之指下總是旋引旋收漸漸退縮之象此時膻中大氣方亂脫閉機括本尚未定其後有因閉而竟脫者有本脫而生氣一線未盡猶可挽回者若必欲於萬難分辨之中而曲為之辨則惟以形細而弦如絲髮梗梗有起伏者閉之象也形散而斷如麻子縈縈無起伏者脫之象也脈經曰頭痛脈短者死據素問寸口脈中手短者頭痛未嘗言死也此短必是脈止於關不能上寸且其勢必是漸漸回縮降入尺中此陽氣下脫不能上達於腦也不但頭痛欲裂亦必耳聾目昧此脈正欲脫之候也少遲診之即無脈矣故凡久病診得伏脈短脈恐是下脫即宜詳問神識清濁二便祕泄以及飲食眠睡有無異常以定吉凶且脈之脫也有霎然自脫者有久閉而漸脫者嘗診一婦久病喘嗽至冬即發始猶能食能言也一日聲微食減便泄痰膠肌熱如焚重撫灼手呼吸逼迫悶塞煩躁喉如曳鋸午甚夜平脈兩寸如絲兩關後洪弦滑數頻下後氣不能自固自覺頭上或胸中不知何處缺少一件本體此肺中為痰涎貯滿真氣下陷不能到肺也始由外感繼傷真元便滑氣泄脾已敗矣其脈必是由關漸縮入尺而絶辭之尋歿經曰自上損下過脾則不治故也亦有久服溫補痰阻上焦或過服寒涼熱氣驟折以致三部無脈退縮尺後此伏脈之類其脈必鼓搏有力與脫脈之旋引旋收者不同也而不善治之將漸脫矣大抵因寒熱而脈伏者為正伏脈其證必鬱於中而不暢因下利而脈伏者為兼脫脈其證必陷於下而不固因喘嗽而脈陷脈縮者久伏致脫上下氣隔陰陽已離也喘躁駛三脈三脈前人皆以數賅之殊不知三脈有兼數者有餘之實脈也不兼數者不足之敗象也喘者自沉而浮有出無入來勢逼迫至浮分即止而不見其氣之反吸也氣之來也如吹管而不復吸入也此命門元根上脫久病虛羸失血脫泄之人忌見之其兼數而實者為痰火濕熱之病應指振撼實大有力出多人少也內經曰赤脈之至也喘而堅有積氣在中時害於食名曰心痹又曰脈至如喘名曰氣厥氣厥者不知與人言此皆實而喘者也躁者亦自沉而浮亦謂之疾來去如電掣而不相連續其來也有頃而一掣其去也有頃而一掣一息不過四五至而無循環容與之意在虛勞久病與代散同論為其氣不相接也在新病實病為痰凝氣鬱與結澀同論大致是血液少而氣燥熱之象駛者自尺上寸如箭之直而迅亦謂之駃亦謂之弛而無浮沉起伏之勢在新病惟風寒咳嗽喘促者不足為忌若久病勞嗽及病困而見者多是元根欲脫也又有來勢略盛而遜於喘亦能吸入惟應指時有戰栗之意如左右彈者此主中氣不足為怔忡為用力過度為中焦停飲為經絡阻滯為元陽衰憊仲景曰脈見轉索者即日死舊解隸之緊脈非也緊脈如轉索者如其轉之緊而徑也此如轉索如其索之動高下左右無定也即喘脈之無神者也總説上二十七脈加喘躁駛三脈凡三十脈總以浮沉遲數虛實長短八者為之提綱得其綱則中有主宰乃可應於無窮故芤革浮也牢伏沉也代遲也促數也濡弱細微虛也洪促牢滑動實也弦緩長也動結滑澀緊散短也沉而長者實也浮而短者虛也一脈有一脈之根原一脈有一脈之主證然形多相似則原與證亦多相近故芤虛相似也浮洪相似也微散相似也滑促動短相似也結澀相似也沉緊牢實相似也弦長緩相似也芤革本一脈而以微甚分也濡弱本一脈而以浮沉分也此以其形言之也推其根原無非陰陽血氣寒熱虛實而已濡弱微虛氣血俱虛也芤血虛也遲氣虛也伏氣閉也代散氣脫也細結氣血俱寒也革陰盛於上也牢陰盛於下也長短同有氣鬱氣橫於氣分則長氣結於血分則短也滑澀同主血分血寒則澀血熱則滑血虛則滑而芤血實則澀而結也促洪氣熱於氣分也動滑氣熱於血分也浮數氣熱於氣分也沉遲氣寒於血分也弦革氣寒於氣分也結緊氣寒於血分也細血中氣寒也緩血中氣熱也濡弱微氣血俱虛而有微甚之殊也伏代散俱屬於氣而有脫閉之別也散與結同主癥瘕正氣未衰則結正氣既衰則散也亦有乍病停滯而脈散者則以氣血新亂而未復也此推其根言之也是故脈之稱名有可以互通者濡弱本可互稱細微亦可借用緩而兼遲兼澀則緩亦可言濡弦而無力無神則弦亦可言緊浮與芤濡與緩本二脈也而芤而緩亦可曰浮而濡沉與實滑與動本二脈也而沉而動亦可曰滑而實此皆稱名之可以出入者也亦有必不可不細辨者本濡弱也而或以為微本微細也而或以為伏弦而無力也竟以為緩而有胃氣結而氣鬱也竟以為澀而少血液虛實既昧攻補必差故王叔和曰謂沉為伏則方治永乖以緩為遲則危殆立至此又稱名之不可移易者也凡求脈必先能辨其近似而知其確然各有所主也然後能得其會通而知其渾然皆出於一也無他明其義理而已義理何在曰陰陽血氣寒熱虛實而已其於病也外六淫也內七情也何臟何腑何經也其來路從何來其去路從何去也凡此皆於脈測之脈法顧不重乎以脈測病更以病證脈讀書臨診刻刻用心何患不及古人耶病有相反而相似者脈亦有相反而相似者病相似者寒極似熱熱極似寒實極似虛虛極似實是也脈則滑主痰而痰亦見澀弦主肝邪而肝亦見濡癥疝脈緊牢而亦有遲澀而散元根不固上氣喘促脈虛大也而亦有應指洪實來去分明孕脈必滑利也而亦有虛澀不調又弦緩相反也而風弦與熱緩相似滑澀相反也而熱澀與虛滑相似傳與散相反也而摶而纍纍不續即與散同論洪與伏相反也而尸厥霍亂伏與洪同斷長與短相反也而長而徑與短而摶同主氣逆氣鬱有以無脈為病所者若芤脈浮大按之中空內主精血之虛也有以有脈為病所者若緊脈浮數按之內減外主風寒之傷也尺不上關邪遏於上也寸不下關陽越於上也凡此惟能察神者澄心渺慮洞徹隱微不為所惑仲景云脈不空見中必有姦常有病淺而見危脈病危而見平脈下病而脈見於上上病而脈見於下右病而脈見於左左病而脈見於右變化萬端不可方物惟在會心難以言喻自然子評曰豫讀診書多矣或剖析形狀或羅列主病至於義理闕焉無聞即或道及亦不過泛論陰陽血氣而已擇焉不精語焉不詳總由真境未明胸無主宰故字裡行間欲吐仍茹此獨一一緊靠本脈從陰陽血氣各透發其所以然之故使讀者恍然於脈象之所由變見即曉然於各脈見證之所從來蓋推明各脈變象之根原而所見之證與治之之法舉賅其中而不待他求矣誠向來診書獨闢未有之境也卷首諸篇煌煌大文如懸日月固已揭出千古迷途矣至如濡弱二脈他人斤斤致辨惟恐相紊也此獨徑合為一滑澀動結世只知其相反也此獨暢論其相同而其不同之處以一二語醒之便自豁然又謂澀代二脈只於止中見之須察其未止之時脈象何如以定吉凶芤革二脈一為陰虛一為陰盛迥不相侔尤為深中肯綮撥去雲霧而見白日使人撫掌稱快者也非讀書臨診細心體察孰能與於斯耶世有知音子豈阿好潛初診脈部位左診心肝腎右診肺脾命而各系以所相表裡之腑凡脈一手單見者以之兩寸主上焦兩關主中焦兩尺主下焦凡脈兩手同見者以之此相沿之定法也然其中有變焉不獨命門一診聚訟紛紛也前著三部九候大義不議及此者彼述天下之通義此據一人之創見也五臟惟心無候何則脈以候邪有邪始有候心不受邪故無脈可候也心受邪則死矣故心至有可候已無所候之矣故吾以左寸候包絡關候肝膽右寸候肺關候脾胃兩尺以形體候腎水以動勢候命火不分左右也此定位也大小腸候兩寸亦候兩尺膀胱候尺亦候兩寸此以證參之者也三焦一經舊説分三部候之夫三焦為命門相火之所充周也前於命門三焦説詳之矣其實命門為體三焦為用兩尺正候命門本體兩寸關候命火之行於上中二焦者皆以動勢為主命門三焦固相通三焦亦不能板分三部也凡如此者非好為異説也考之聖經驗之人事而有以知其必然也素問曰腎脈喘喘纍纍如鉤按之而堅曰平夫按之而堅腎脈也水也喘喘纍纍如鉤心脈也火也心指包絡下同繫於腎者君火與相火同氣也難經亦曰按之軟舉指來疾者腎也非形勢並見耶大小腸之無定候已見前編卷一陳修園何西池之説矣膀胱亦候兩寸者腎水凌心膀胱之寒氣凌之也小便赤澀心火之盛而下郁也故左寸沉遲膀胱必寒左寸細數膀胱必熱水之行也肺氣運之也故右寸上湧小便不調也右寸弱陷小便不禁也故肺氣充者小便少而長氣足以攝之也肺氣虛者頻而短氣不足以攝之也右寸沉實而二便不通者宣疏肺氣即通矣右寸浮弦而二便不通者清降肺氣即通矣脈經以膀胱候寸以脾候尺始未識也更事既久乃悟之矣脾候尺者內經所謂中氣不足溲溺為之變是也如脾家濕熱太甚則克腎水而兩尺必滑而緩矣腎受脾邪陰血燥熱水沸漸涸二便不調遺精白濁強中諸證蜂起此危候宜急治者也脈訣以尺滑主食注食即注下內經謂之洞亦曰暴食不潔倉公謂之迵風為脾咎戴氏斥之不亦淺乎夫女子經水不利專候心肺之脈義見評熱病論而脈經以膀胱肝腎之病候於兩寸者不一而足今其法失傳矣然明者猶能以理測之至於三焦之經其氣傷於升降者則逐位間隔圓疾如豆傷於出入者則弦細而數躍躍於中沉之分而不揚也以脈之形勢而不以部位矣吾於診法得力於滑氏之六字者最深部位其淺焉者也聊識於此以備遺忘講脈學者須先明部位之有定而後漸漸悟入部位之無定則庶幾矣自古明賢未嘗全泥定位亦未嘗全棄定位也五臟六腑性情脈臟腑性情腑陽多含母精臟陰多見子氣蓋臟腑五行之相生也從陽入陰從陰入陽如水生木必腎生膽膽生肝也木生火必肝生小腸小腸生心也火生土必心生胃胃生脾也土生金必脾生大腸大腸生肺也金生水必肺生膀胱膀胱生腎也陰陽以相間而相和也故屬陽者中含母精屬陰者中藏子氣故膽雖陽也以有水氣故力弱而微肝雖陰也以有火氣故力強而大小腸脈洪而兼長有木氣也心包絡脈洪而兼緩有土氣也張仲景曰心脈洪大而長是也胃脈脾脈雖不可單見而胃緩而浮脾緩而靜一含火熱一具金寒也大腸浮而長有脾土之氣也肺脈浮而短有腎水之氣也膀胱沉而寬薄有肺金之氣也腎脈沉而堅實有肝木之氣也杜光庭曰嚴冬尺脈要沉弦是也此五臟六腑之本脈也至於病變亦以母子相乘者為多以其氣相親也而直克反侮者重病死病乃有之以其氣相逆也故腎病有見肝脈有見肺脈肝病有見心脈有見腎脈心病有見脾脈有見肝脈脾病有見肺脈有見心脈肺病有見脾脈有見腎脈非必病氣自彼臟傳來也亦非必彼臟氣來相干也本臟之中自具此氣病則氣有所偏而易見耳仲景有五行相乘縱橫逆順之説又有治未病之法吾之明此為治未病之法亦必審真而後可用五臟互見其氣有不必病邪之相傳也如心病見肝脈並非肝邪來犯妄為瀉肝豈不誅伐無過耶何以決其相傳與非相傳也二臟脈氣相應不相應也相應者脈氣同見也互見也不相應者二臟自見其本氣而靜也同見者如脾氣干肺肺部脾部同見脾脈也治宜脾肺兩瀉互見者肺部見脾脈脾部轉見肺脈或見他臟脈而不自見其本脈也此為捨己宮觀適他鄉邦治宜瀉肺補脾自見本氣而靜者肺部雖微見脾脈而脾部自靜無所太盛也他臟仿此此大法也弦鉤毛石四時脈四脈惟弦之義最顯石與毛次之鉤最難解石者實也沉而有力往來不遠而有平靜堅固之體也人當盛暑逐日泄汗及秋而津液內虛矣故脈體見薄且新涼乍見陽氣乍衰來勢不能洪盛故浮候其形應指輕而如毛也秋日下膚稍按方能見大非秋脈僅見浮毛也豈有秋脈反更浮於夏耶夏脈洪也而言鉤者所以形容來盛去衰之象也蓋冬脈之靜固者至此盡發故其來之根深而長如鉤之柄也其去不甚有力不及來之深而長如鈞之曲也陽盛而陰之吸力少也脈經曰萬物洪盛垂枝布葉皆下垂如曲故名曰鉤正以上盛極而下折也是以鉤之形狀脈之來去之勢也非以狀脈之形也故洪鉤雖俱為夏脈之名而實不同洪但言其來盛鉤並繪其去衰也杜光庭曰洪鉤夏脈居寸口堪笑世人多不曉脈若俱洪不帶鉤鉤不應時血常走可識洪鉤之為義矣後人多以如握帶鉤釋之夫操帶鉤死脈也自尺而上聚寸口頭大尾空按之頑梗而無起伏之勢也以脈喻帶以鉤喻寸口之死硬也豈夏鈞之義耶四脈惟夏鉤純以勢見餘脈皆形勢並見形血也勢氣也輕虛以滑弦之勢也端直以長弦之形也輕虛以浮毛之形也來急去散毛之勢也石沉而搏沉形搏勢也鉤則但曰來盛去衰以勢為形也後人概泥形而遺勢故言弦者疑輕虛以滑之不真也言毛者惡來急去散之不切也言石者議搏之太甚也至於鉤亦以形概之窒而難通不得不以握鉤含糊釋之無怪口中筆下囁嚅不清矣表裡脈一論難經浮為在表沉為在裡數為在腑遲為在臟難經曰浮為在表沉為在裡數為在腑遲為在臟四者非主病之正脈也乃表裡臟腑之主脈也故表病診得表脈其脈必於浮分見之乃真在表而無疑矣若不浮而沉猶宜再審恐其兼里也里病診得里脈其脈必於沉分見之乃真在裡而無疑矣若不沉而浮猶宜再審恐其兼表也腑病診得腑脈必於數中見之乃真在腑而無疑也臟病診得臟脈必於遲中見之乃真在臟而無疑也腑病兼遲必兼在臟可知也臟脈兼數必兼在腑可知也是故浮沉遲數者以定病之在表在裡在腑在臟也非以主表裡臟腑之病也病固自有主脈也病無定情脈無單見故亦有表病脈沉里病脈浮臟病脈數腑病脈遲者究竟亦必有其病不專在表在裡在腑在臟也後人讀書死於句下以為不問主病何脈但以浮沉遲數決臟腑表裡之病無怪異議蜂起也抑吾更有説焉脈經引扁鵲曰脈一出一入為平再出一入為少陰三出一入為太陰四出一入為厥陰再入一出為少陽三入一出為陽明四入一出為太陽出者為陽入者為陰夫出入者來去也一二三四者遠近也遲數也是故脈雖沉而其勢極欲浮而不得浮是即邪據於表也脈雖浮而其勢如不欲浮是即正衰於內也數則四出一入是脈來之時多而停於內者其時少是氣聚於陽也遲則四入一出是脈來之時少而停於內者其時多是氣鬱於陰也聚於陽故在腑也鬱於陰故在臟也此難經據其實者言之也聚於陽則陰不內斂故為陰病也鬱於陰則陽不外振故為陽病也此扁鵲據其虛者言之也故張景嶽謂外感初起脈多沉緊而數殊不知其緊數即是浮也久病虛羸脈多浮而濡弱殊不知其濡弱即是沉也古人立言只擇其至正至廣者立之規矩至於變化在臨診自求而已若但如素問所謂脈太過病在外豈無表虛腑虛耶但謂脈不及病在中豈無裡實臟實耶故浮沉遲數四者絶不涉病脈而但各從其氣之本體以立之綱使臨診者各以其所見之脈合之而無不合也此古人之精到不可及也夫不求闡明古人言中之意而務為攻擊以為讀書得間此經生浮誇之習也操司命之權者亦出於此也而豈可哉而豈可哉表裡脈二論太過不及人迎氣口脈要精微以脈強太過病在外脈弱不及病在中此在字當作生字解謂病生於外邪病生於內虛也故曰病在中脈實堅病在外脈不實堅者難治表言外感里言內傷此表裡之一説也脈經曰沉而弦急者病在中浮而洪大者病在外脈實者病在中脈虛者病在外此病字統指外邪謂外邪內侵則脈沉實邪淺未深則按之猶虛也故又曰病在中脈虛病在外脈澀堅者難治前以脈形之強弱言此以脈位之浮沉言也此表裡之又一説也靈樞經脈篇陰經盛則氣口大於人迎陽經盛則人迎大於氣口所謂寸口主中人迎主外也汪石山曰左脈不和為病在表為陽主四肢右脈不和為病在裡為陰主腹臟此表裡之一説也王好古曰傷寒以左為表右為里雜病以右為表左為里慎柔五書曰嘗觀脾胃不足及久病之人未有不左脈大過於右者正東垣左脈克右脈之説理勢使然況脾土一虛肺金益衰水涸木枯枯木生火焉得左脈不大於右此表裡之又一説也其如是不同者何也蓋病有外感有內傷有氣分有血分病機有內向有外向有上行有下行如表病侵里邪內陷則脈沉實里病連表邪湧盛則脈浮洪氣口主中者內之邪氣盛則氣口大陰氣衰則氣口小人迎主外者外之邪氣盛則人迎大陽氣衰則人迎小又如陽盛者有陰虛有陰不虛陰盛者有陽虛有陽不虛變化萬端未可概論惟靈樞曰陽病而陽脈小者為逆陰病而陰脈大者為逆二語最為周密以脈測病更以病證脈斯推之而無不合矣表裡脈三論尺寸為表關為里並論病之表裡有脈之表裡有病之表裡脈之表裡如上二篇是也病之表裡陰陽臟腑是也然脈經曰脈有表無里邪之所止得鬼病也何謂有表無里尺寸為表關為里兩頭有脈關中絶不至也寸脈下不至關為陽絶尺脈上不至關為陰絶死不治又曰審切寸口之脈知絶不絶前後去為絶前後去者上下分絶也此皆以尺寸為表關為里也病之表裡亦有異者內經曰在內者五臟為陰六腑為陽在外者筋骨為陰肌肉為陽吾謂外感之六淫在經絡為表在臟腑為里內傷之五味在腸胃為表在肌肉筋骨為里謂敗氣敗血流於骨節筋會者也劉河間謂身表為遠里為近是也總以初傷者為表輾轉漸入者為里而已而脈以尺寸為表關為里其義難曉不敢強解豈以脾胃中焦為上下之樞故為里耶又有出為表入為里此即難經所謂呼者隨陽出吸者隨陰入也表裡脈四申論左右表裡王海藏曰傷寒以左脈為表右為里雜病以右脈為表左為里豫初診不盡驗心以為此特一法耳固不可拘也近二年來深察病情脈象有可得而言者凡外感風寒濕之邪深者皆系左脈沉細於右淺者但兩手浮弦或右關前浮弦而已外感暑熱之邪深者皆系左脈弱散於右淺者但兩手浮滑或右關前浮大而已溫病之由於伏氣內發者前人皆以右大於左為詞謂邪從中道胃氣鬱濁之故以吾歷診春溫冬溫喉痧疫疹諸症凡右大於左而左脈不甚細弱者真陰未損治之易愈若左脈沉細而數斷續不勻真陰已竭十難救一是當以左小於右定正氣之成敗不當專以左大於右定邪氣之微甚也又診夏行秋令時疫有所謂癟螺痧者其證先見頭痛心嘈四肢麻冷螺紋陷下或吐或瀉旋即昏厥重者即死輕者醒後越一二日而死醒後心中煩悶其苦難言而神識清明額汗不止其脈皆兩手沉細短伏關後而左手尤甚此天行肅殺之氣傷其心肝生陽之氣亦由其人生陽之本虛也又診水腫之人陰邪極盛亦莫不左脈沉小於右此外一切大病久病邪氣深入者莫非左陷於右元氣虧甚者亦莫非左弱於右其將愈也則又右脈先盛左脈後復必待左脈復盛乃為元根充固其病可無慮反復矣病氣輕淺左脈決不受傷惟癥瘕積聚其病雖深必隨其經絡之部位而見於脈不能拘於此例也由此觀之左里右表者百病之通診傷寒豈能獨異耶故吾以左脈察邪氣之淺深即以左脈察元氣之虛實其脈象須各因病而定不得專以大小二字賅之寒邪以細而急為甚熱邪以薄而散為甚陰虛以浮散而短為甚陽虛以沉細而短為甚其敗也總歸於躁疾散斷全無神力而已矣海藏之劈分傷寒雜病者彼蓋以雜病為勞倦內傷也由氣分漸傷入血分血傷而左脈敗矣故左為里也寒為陰邪先傷於陽內傳胃實而右脈大矣故右為里也殊不知陽明證乃陽氣之內鬱而盛有撑邪外出之機不得謂之寒邪內陷寒邪陷者少陰厥陰之寒證是也是仍當在左手矣況左右又有未可板分者大凡病之始生也屬陽虛與寒盛者左脈常沉小於右屬陰虛與熱盛者右脈常浮大於左若沉小之極而右脈亦陷則胃陽絶矣浮大之極而左脈亦散則腎陰絶矣故喉痧之死脈皆右關與左脈同其短數癟螺痧之治脈皆右關緩滑有力左脈雖伏而不見散斷者也左脈重尺右脈重關盛啓東以新病之死生主乎右手之關脈久病之死生主乎左手之關尺義正如此此皆取其偏重者言之也若夫邪氣之猝至雖兩手脈伏尚不為凶病久邪雜陰陽臟腑俱困者但一部脈壞即為不吉是又在於圓機應變者
